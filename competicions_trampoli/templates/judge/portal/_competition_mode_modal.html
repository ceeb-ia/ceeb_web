<div
  id="competitionModeModal"
  class="competition-mode-modal d-none"
  role="dialog"
  aria-modal="true"
  aria-hidden="true"
  aria-labelledby="competitionModeTitle"
  style="position:fixed; inset:0; z-index:1080;"
>
  <div
    class="competition-mode-backdrop"
    style="position:absolute; inset:0; z-index:0; background:rgba(15,23,42,.55);"
  ></div>
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable" style="position:relative; z-index:2;">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h5 class="modal-title" id="competitionModeTitle">Mode competicio</h5>
          <div class="text-muted small" id="competitionModeSubtitle"></div>
        </div>
        <button type="button" class="btn-close" id="competitionModeClose" aria-label="Tancar"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
          <span class="badge text-bg-light" id="competitionModePosition">0 / 0</span>
          <span class="badge text-bg-secondary" id="competitionModeState">Pendent</span>
        </div>
        <div id="competitionModeEditorHost"></div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" id="competitionModePrev">Anterior</button>
          <button type="button" class="btn btn-sm btn-outline-secondary" id="competitionModeNext">Seguent</button>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" id="competitionModeExit">Sortir</button>
          <button type="button" class="btn btn-sm btn-primary" id="competitionModeSave">Desar</button>
        </div>
      </div>
    </div>
  </div>
</div>
