{% if video_capture_enabled %}
<div class="mt-2" id="video-panel-{{ ins.id }}-{{ ex }}" data-video-panel-inner="1" data-ins-id="{{ ins.id }}" data-exercici="{{ ex }}">
  <div class="d-flex align-items-center flex-wrap" style="gap:8px;">
    <button type="button" class="btn btn-sm btn-outline-danger" id="video-rec-btn-{{ ins.id }}-{{ ex }}" onclick="toggleRecord('{{ ins.id }}', '{{ ex }}')">Gravar</button>
    <button type="button" class="btn btn-sm btn-outline-primary" id="video-upload-btn-{{ ins.id }}-{{ ex }}" onclick="uploadRecorded('{{ ins.id }}', '{{ ex }}')" disabled>Pujar</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" id="video-delete-btn-{{ ins.id }}-{{ ex }}" onclick="deleteVideo('{{ ins.id }}', '{{ ex }}')" disabled>Regravar</button>
    <span class="judge-meta video-status" id="video-status-{{ ins.id }}-{{ ex }}">Sense vídeo</span>
  </div>
  <video id="video-preview-{{ ins.id }}-{{ ex }}" class="judge-video-preview mt-2" controls playsinline style="display:none;"></video>
</div>
{% else %}
<div class="judge-video-disabled">
  <span class="judge-meta">Gravacio desactivada per aquest QR.</span>
</div>
{% endif %}
