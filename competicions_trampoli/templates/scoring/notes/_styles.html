  <style>
    .table-sticky thead th{ position: sticky; top: 0; z-index: 2; background: #f8f9fa; }
    .th-center{ text-align:center; white-space:nowrap; }
    .cell-center{ text-align:center; vertical-align:middle; }
    .name-cell{ min-width:260px; }
    .order-cell{ width:70px; }
    .input-salt{ width:56px; padding: .15rem .25rem; text-align:center; }
    .input-num{ width:110px; padding: .15rem .4rem; }
    .readonly{ background:#eef1f4 !important; }
    .mini-help{ color:#6c757d; font-size:.85rem; }

    /* barra de scroll superior com al trampolí */
    .table-scrollbar-top{ overflow-x:auto; width:100%; height:16px; margin-bottom:2px; }
    .table-scrollbar-top > div{ height:1px; }
    .th-draggable{ cursor: grab; user-select:none; }
    .th-draggable.dragging{ opacity:.5; }
    .th-drop-hint{ outline:2px dashed #adb5bd; outline-offset:-2px; }
    .playback-title{ font-weight:600; margin-bottom:2px; }
    .playback-subtitle{ color:#6c757d; font-size:.85rem; margin-bottom:8px; }
    .playback-list{ display:flex; flex-wrap:wrap; gap:6px; }
    .playback-track-btn{ border:1px solid #cfd4da; background:#fff; border-radius:999px; padding:2px 10px; font-size:.82rem; }
    .playback-track-btn.active{ background:#173f7a; color:#fff; border-color:#173f7a; }
    .playback-empty{ color:#6c757d; font-size:.82rem; }
    .playback-name-btn{ font-weight:600; color:#173f7a; text-decoration:none; }
    .playback-name-btn:hover{ text-decoration:underline; }
    .playback-media-badge{ border:1px solid #d1d7de; border-radius:999px; padding:2px 8px; background:#f8f9fb; font-size:.74rem; color:#304255; }
    .playback-media-badge:hover{ background:#eef3f8; border-color:#bfc8d1; color:#1f3348; }
    .playback-active-row td{ background:#fff6de; }
    .judge-row-counts td:first-child{ box-shadow: inset 3px 0 0 #198754; }
    .judge-row-absent td:first-child{ box-shadow: inset 3px 0 0 #adb5bd; }
    .judge-presence-chip{ display:inline-block; border-radius:999px; padding:1px 6px; font-size:.68rem; line-height:1.2; white-space:nowrap; }
    .judge-presence-chip.counts{ background:#e7f4ec; color:#146c43; border:1px solid #b7dfc4; }
    .judge-presence-chip.absent{ background:#f1f3f5; color:#6c757d; border:1px solid #d7dce0; }
    .playback-video{ width:100%; max-width:420px; border-radius:8px; background:#000; }
    .media-drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.45);
      z-index:1040;
      display:none;
    }
    .media-drawer-backdrop.show{ display:block; }
    .media-drawer{
      position:fixed;
      top:0;
      right:0;
      width:min(92vw,420px);
      height:100vh;
      background:#fff;
      border-left:1px solid #d8dce2;
      box-shadow:-8px 0 24px rgba(0,0,0,.14);
      z-index:1050;
      transform:translateX(100%);
      transition:transform .22s ease;
      display:flex;
      flex-direction:column;
    }
    .media-drawer.show{ transform:translateX(0); }
    .media-drawer-head{
      padding:.8rem .9rem;
      border-bottom:1px solid #e9ecef;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:.5rem;
    }
    .media-drawer-body{
      padding:.8rem .9rem 1rem;
      overflow:auto;
    }
    .media-drawer-player{
      border:1px solid #d8dce2;
      border-radius:10px;
      padding:8px;
      background:#fafbfc;
    }
    .media-drawer-player .playback-video{
      max-width:100%;
      margin:0;
    }
    .media-track-group{ margin-bottom:10px; }
    body.media-drawer-open{ overflow:hidden; }
    .notes-control-panel{
      border:1px solid #dbe1e7;
      border-radius:8px;
      background:#f8fafc;
      padding:.75rem;
      margin-bottom:.9rem;
    }
    .notes-toolbar{
      display:grid;
      grid-template-columns:minmax(120px,.75fr) minmax(170px,1.05fr) minmax(140px,.9fr) minmax(100px,.55fr) minmax(130px,.75fr) minmax(220px,1.25fr);
      gap:.65rem;
      align-items:end;
    }
    .notes-toolbar label{
      display:block;
      margin-bottom:.2rem;
      font-size:.74rem;
      font-weight:600;
      color:#52606d;
    }
    .notes-program-strip{
      display:flex;
      flex-wrap:wrap;
      gap:.4rem;
      margin-top:.65rem;
    }
    .notes-program-chip{
      border:1px solid #cfd8e3;
      border-radius:999px;
      background:#fff;
      color:#263645;
      padding:.18rem .55rem;
      font-size:.78rem;
      line-height:1.35;
    }
    .notes-search-wrap{ position:relative; }
    .notes-search-results{
      position:absolute;
      top:100%;
      left:0;
      right:0;
      z-index:30;
      max-height:280px;
      overflow:auto;
      background:#fff;
      border:1px solid #cfd8e3;
      border-radius:6px;
      box-shadow:0 12px 28px rgba(15,23,42,.14);
      display:none;
    }
    .notes-search-results.show{ display:block; }
    .notes-search-result{
      width:100%;
      border:0;
      border-bottom:1px solid #edf1f5;
      background:#fff;
      text-align:left;
      padding:.45rem .6rem;
    }
    .notes-search-result:hover,
    .notes-search-result:focus{ background:#eef5ff; }
    .notes-search-result .name{ font-weight:600; color:#173f7a; }
    .notes-search-result .meta{ font-size:.78rem; color:#6c757d; }
    .notes-table-placeholder{
      border:1px dashed #cfd8e3;
      border-radius:8px;
      background:#fbfcfe;
      color:#6c757d;
      padding:1rem;
      text-align:center;
      margin-bottom:.75rem;
    }
    .notes-main-shell{
      border:1px solid #dbe1e7;
      border-radius:8px;
      background:#fff;
      padding:.75rem;
    }
    .notes-main-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:.75rem;
      flex-wrap:wrap;
      margin-bottom:.65rem;
    }
    .notes-main-title{
      font-weight:700;
      color:#203040;
    }
    .notes-main-meta{
      color:#6c757d;
      font-size:.82rem;
    }
    .notes-status{
      font-size:.82rem;
      color:#6c757d;
    }
    .notes-status.is-error{
      color:#b42318;
    }
    .notes-legacy-tabs{
      max-height:92px;
      overflow:auto;
    }
    .score-warning-row td{
      box-shadow:inset 3px 0 0 #f59f00;
    }
    .score-warning-chip{
      display:inline-flex;
      align-items:center;
      gap:.25rem;
      border:1px solid #f1b44c;
      border-radius:999px;
      background:#fff7e6;
      color:#7a4a00;
      font-size:.72rem;
      line-height:1.2;
      padding:.12rem .42rem;
      margin-left:.35rem;
      vertical-align:middle;
    }
    .notes-warning-summary{
      border:1px solid #f1b44c;
      border-radius:8px;
      background:#fffaf0;
      padding:.75rem;
    }
    .notes-warning-list{
      display:flex;
      flex-direction:column;
      gap:.5rem;
    }
    .notes-warning-item{
      border:1px solid #ead7ae;
      border-radius:6px;
      background:#fff;
      padding:.55rem .65rem;
      display:grid;
      grid-template-columns:1fr auto;
      gap:.5rem;
      align-items:center;
    }
    .notes-warning-item-title{
      font-weight:700;
      color:#253141;
    }
    .notes-warning-item-meta{
      color:#6c757d;
      font-size:.8rem;
      margin-top:.12rem;
    }
    .notes-warning-empty{
      color:#6c757d;
      text-align:center;
      padding:.7rem;
    }
    @media (max-width: 992px){
      .notes-toolbar{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 576px){
      .notes-toolbar{ grid-template-columns:1fr; }
    }

  </style>
