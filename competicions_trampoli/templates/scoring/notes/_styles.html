  <style>
    .card-surface {
      --notes-base: #a16207;
      --notes-base-hover: #854d0e;
      --notes-bg: #fffbeb;
      --notes-border: #fde68a;
      --notes-text: #78350f;
      --notes-soft-border: #f8e2a5;
      --notes-muted: #7c5b24;
      --notes-surface: #ffffff;
      --notes-neutral-border: #e2e8f0;
      --notes-neutral-text: #0f172a;
      --notes-neutral-muted: #64748b;
    }
    .notes-page-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
      border:0;
      border-bottom:1px solid var(--notes-neutral-border);
      border-radius:0;
      background:transparent;
      padding:18px 12px 16px;
    }
    .notes-title-block{
      min-width:0;
      flex:1 1 460px;
    }
    .notes-page-title{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin:0;
      color:var(--notes-text);
      font-size:clamp(1.9rem, 3vw, 2.45rem);
      font-weight:800;
      line-height:1.05;
      letter-spacing:0;
    }
    .notes-title-logo{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:42px;
      height:42px;
      border:1px solid rgba(161, 98, 7, .2);
      border-radius:10px;
      background:#fff;
      box-shadow:0 8px 18px rgba(161, 98, 7, .09);
      flex:0 0 auto;
    }
    .notes-title-logo img{
      display:block;
      width:28px;
      height:28px;
      object-fit:contain;
    }
    .notes-context-line{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:7px 10px;
      margin-top:10px;
      color:var(--notes-neutral-muted);
      font-size:.9rem;
      line-height:1.35;
    }
    .notes-context-line > span:not(:first-child)::before{
      content:"";
      display:inline-block;
      width:4px;
      height:4px;
      margin-right:10px;
      border-radius:999px;
      background:#cbd5e1;
      vertical-align:middle;
    }
    .notes-context-main{
      color:var(--notes-neutral-text);
      font-weight:650;
    }
    .notes-header-actions{
      display:flex;
      flex:0 1 auto;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
    }
    .scoring-panel-dropdown .scoring-panel-dropdown-toggle{
      font-weight:750;
      letter-spacing:0;
    }
    .scoring-panel-dropdown .dropdown-menu{
      min-width:230px;
      margin-top:8px;
      padding:8px;
      border:1px solid var(--notes-border);
      border-radius:12px;
      background:linear-gradient(180deg, #ffffff 0%, #fffdf7 100%);
      box-shadow:0 18px 34px rgba(15, 23, 42, .16);
      font-family:inherit;
      overflow:hidden;
    }
    .scoring-panel-dropdown .dropdown-menu::before{
      content:"";
      display:block;
      height:3px;
      margin:-8px -8px 7px;
      background:var(--notes-base);
    }
    .scoring-panel-dropdown .dropdown-item{
      display:flex;
      align-items:center;
      min-height:34px;
      border-radius:8px;
      color:var(--notes-neutral-text);
      font-size:.9rem;
      font-weight:650;
      line-height:1.25;
      padding:.48rem .65rem;
      white-space:normal;
      transition:background-color .15s ease, color .15s ease, box-shadow .15s ease;
    }
    .scoring-panel-dropdown .dropdown-item:hover,
    .scoring-panel-dropdown .dropdown-item:focus{
      background:var(--notes-bg);
      color:var(--notes-text);
      box-shadow:inset 3px 0 0 var(--notes-base);
      outline:0;
    }
    .table-sticky thead th{ position: sticky; top: 0; z-index: 2; background: #f8f9fa; }
    .th-center{ text-align:center; white-space:nowrap; }
    .cell-center{ text-align:center; vertical-align:middle; }
    .name-cell{ min-width:260px; }
    .order-cell{ width:70px; }
    .input-salt{ width:56px; padding: .15rem .25rem; text-align:center; }
    .input-num{ width:110px; padding: .15rem .4rem; }
    .readonly{ background:#eef1f4 !important; }
    .mini-help{ color:#6c757d; font-size:.85rem; }

    /* barra de scroll superior com al trampolí */
    .table-scrollbar-top{ overflow-x:auto; width:100%; height:16px; margin-bottom:2px; }
    .table-scrollbar-top > div{ height:1px; }
    .th-draggable{ cursor: grab; user-select:none; }
    .th-draggable.dragging{ opacity:.5; }
    .th-drop-hint{ outline:2px dashed #adb5bd; outline-offset:-2px; }
    .playback-title{ font-weight:600; margin-bottom:2px; }
    .playback-subtitle{ color:#6c757d; font-size:.85rem; margin-bottom:8px; }
    .playback-list{ display:flex; flex-wrap:wrap; gap:6px; }
    .playback-track-btn{ border:1px solid #cfd4da; background:#fff; border-radius:999px; padding:2px 10px; font-size:.82rem; }
    .playback-track-btn.active{ background:var(--notes-base); color:#fff; border-color:var(--notes-base); }
    .playback-empty{ color:#6c757d; font-size:.82rem; }
    .playback-name-btn{ font-weight:600; color:var(--notes-text); text-decoration:none; }
    .playback-name-btn:hover{ text-decoration:underline; }
    .playback-media-badge{ border:1px solid #d1d7de; border-radius:999px; padding:2px 8px; background:#f8f9fb; font-size:.74rem; color:#304255; }
    .playback-media-badge:hover{ background:#eef3f8; border-color:#bfc8d1; color:#1f3348; }
    .playback-active-row td{ background:#fff6de; }
    .judge-row-counts td:first-child{ box-shadow: inset 3px 0 0 #198754; }
    .judge-row-absent td:first-child{ box-shadow: inset 3px 0 0 #adb5bd; }
    .judge-presence-chip{ display:inline-block; border-radius:999px; padding:1px 6px; font-size:.68rem; line-height:1.2; white-space:nowrap; }
    .judge-presence-chip.counts{ background:#e7f4ec; color:#146c43; border:1px solid #b7dfc4; }
    .judge-presence-chip.absent{ background:#f1f3f5; color:#6c757d; border:1px solid #d7dce0; }
    .playback-video{ width:100%; max-width:420px; border-radius:8px; background:#000; }
    .media-drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.45);
      z-index:1040;
      display:none;
    }
    .media-drawer-backdrop.show{ display:block; }
    .media-drawer{
      position:fixed;
      top:0;
      right:0;
      width:min(92vw,420px);
      height:100vh;
      background:#fff;
      border-left:1px solid #d8dce2;
      box-shadow:-8px 0 24px rgba(0,0,0,.14);
      z-index:1050;
      transform:translateX(100%);
      transition:transform .22s ease;
      display:flex;
      flex-direction:column;
    }
    .media-drawer.show{ transform:translateX(0); }
    .media-drawer-head{
      padding:.8rem .9rem;
      border-bottom:1px solid #e9ecef;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:.5rem;
    }
    .media-drawer-body{
      padding:.8rem .9rem 1rem;
      overflow:auto;
    }
    .media-drawer-player{
      border:1px solid #d8dce2;
      border-radius:10px;
      padding:8px;
      background:#fafbfc;
    }
    .media-drawer-player .playback-video{
      max-width:100%;
      margin:0;
    }
    .media-track-group{ margin-bottom:10px; }
    body.media-drawer-open{ overflow:hidden; }
    .notes-control-panel{
      border:1px solid var(--notes-border);
      border-radius:12px;
      background:linear-gradient(180deg, #ffffff 0%, #fffdf7 100%);
      box-shadow:0 10px 28px rgba(161, 98, 7, .08);
      padding:.9rem;
      margin-bottom:.9rem;
    }
    .notes-toolbar{
      display:grid;
      grid-template-columns:minmax(120px,.72fr) minmax(170px,1fr) minmax(140px,.86fr) minmax(110px,.62fr) minmax(130px,.72fr) minmax(150px,.86fr) minmax(220px,1.25fr);
      gap:.65rem;
      align-items:end;
    }
    .notes-toolbar > div{
      min-width:0;
    }
    .notes-toolbar label{
      display:block;
      margin-bottom:.24rem;
      font-size:.74rem;
      font-weight:750;
      color:var(--notes-text);
      letter-spacing:0;
    }
    .notes-control-panel .form-control{
      width:100%;
      min-height:36px;
      border-color:color-mix(in srgb, var(--notes-base) 34%, #cbd5e1);
      border-radius:9px;
      background-color:#fff;
      color:var(--notes-neutral-text);
      font-size:.88rem;
      box-shadow:none;
    }
    .notes-control-panel select.form-control{
      padding-right:2.15rem;
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      background-image:none !important;
      cursor:pointer;
    }
    .notes-control-panel .form-control:focus{
      border-color:var(--notes-base);
      box-shadow:0 0 0 .14rem rgba(161, 98, 7, .13);
    }
    .notes-control-panel select option:checked{
      background:var(--notes-base);
      color:#fff;
    }
    .notes-control-panel input[type="search"]::placeholder{
      color:#94a3b8;
    }
    .notes-select-shell{
      position:relative;
      border-radius:10px;
      background:#fff;
    }
    .notes-select-shell::before{
      content:"";
      position:absolute;
      left:1px;
      top:1px;
      bottom:1px;
      width:4px;
      border-radius:9px 0 0 9px;
      background:linear-gradient(180deg, var(--notes-base) 0%, #d97706 100%);
      opacity:.72;
      pointer-events:none;
      transition:opacity .15s ease;
    }
    .notes-select-shell::after{
      content:"";
      position:absolute;
      right:.72rem;
      top:50%;
      width:9px;
      height:9px;
      border-right:2px solid var(--notes-text);
      border-bottom:2px solid var(--notes-text);
      transform:translateY(-66%) rotate(45deg);
      pointer-events:none;
      opacity:.9;
    }
    .notes-select-shell:focus-within::before{
      opacity:1;
    }
    .notes-select-shell:focus-within::after{
      border-color:var(--notes-base-hover);
    }
    .notes-control-panel select.notes-filter-select{
      height:38px;
      padding-left:.72rem;
      border-color:#e5cf9b !important;
      background-color:#fff !important;
      color:var(--notes-neutral-text);
      font-weight:650;
      line-height:1.25;
      box-shadow:0 1px 0 rgba(161, 98, 7, .04);
    }
    .notes-control-panel select.notes-filter-select:hover{
      border-color:#d6ad57 !important;
      background-color:#fffdf7 !important;
    }
    .notes-control-panel select.notes-filter-select:focus{
      border-color:var(--notes-base) !important;
      background-color:#fff !important;
      box-shadow:0 0 0 .14rem rgba(161, 98, 7, .14) !important;
    }
    .notes-control-panel select.notes-filter-select:disabled{
      cursor:not-allowed;
      color:#94a3b8;
      background-color:#f8fafc !important;
      border-color:#e2e8f0 !important;
    }
    .notes-control-panel select.notes-filter-select option{
      color:var(--notes-neutral-text);
      font-weight:500;
      background:#fff;
    }
    .notes-control-panel select.notes-filter-select option:checked{
      background:var(--notes-base);
      color:#fff;
      font-weight:700;
    }
    .notes-program-strip{
      display:flex;
      flex-wrap:wrap;
      gap:.4rem;
      margin-top:.65rem;
    }
    .notes-program-chip{
      border:1px solid var(--notes-border);
      border-radius:999px;
      background:#fffdf5;
      color:var(--notes-text);
      padding:.18rem .55rem;
      font-size:.78rem;
      line-height:1.35;
    }
    .notes-search-wrap{ position:relative; }
    .notes-search-results{
      position:absolute;
      top:100%;
      left:0;
      right:0;
      z-index:30;
      max-height:280px;
      overflow:auto;
      background:#fff;
      border:1px solid var(--notes-border);
      border-radius:6px;
      box-shadow:0 12px 28px rgba(15,23,42,.14);
      display:none;
    }
    .notes-search-results.show{ display:block; }
    .notes-search-result{
      width:100%;
      border:0;
      border-bottom:1px solid #edf1f5;
      background:#fff;
      text-align:left;
      padding:.45rem .6rem;
    }
    .notes-search-result:hover,
    .notes-search-result:focus{ background:var(--notes-bg); }
    .notes-search-result .name{ font-weight:600; color:var(--notes-text); }
    .notes-search-result .meta{ font-size:.78rem; color:var(--notes-muted); }
    .notes-table-placeholder{
      border:1px dashed var(--notes-border);
      border-radius:8px;
      background:var(--notes-bg);
      color:var(--notes-muted);
      padding:1rem;
      text-align:center;
      margin-bottom:.75rem;
    }
    .notes-main-shell{
      border:1px solid var(--notes-border);
      border-radius:8px;
      background:#fffdf7;
      padding:.75rem;
    }
    .notes-main-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:.75rem;
      flex-wrap:wrap;
      margin-bottom:.65rem;
    }
    .notes-main-title{
      font-weight:700;
      color:var(--notes-text);
    }
    .notes-main-meta{
      color:var(--notes-muted);
      font-size:.82rem;
    }
    .notes-status{
      font-size:.82rem;
      color:var(--notes-muted);
    }
    .notes-status.is-error{
      color:#b42318;
    }
    .notes-btn-theme-solid{
      border-color:var(--notes-base) !important;
      background:var(--notes-base) !important;
      color:#fff !important;
      font-weight:700;
      box-shadow:0 6px 14px rgba(161, 98, 7, .16);
    }
    .notes-btn-theme-solid:hover,
    .notes-btn-theme-solid:focus{
      border-color:var(--notes-base-hover) !important;
      background:var(--notes-base-hover) !important;
      color:#fff !important;
      box-shadow:0 7px 16px rgba(133, 77, 14, .2);
    }
    .notes-btn-theme-solid:focus-visible{
      outline:0;
      box-shadow:0 0 0 .16rem rgba(161, 98, 7, .2);
    }
    .notes-btn-theme-outline{
      border-color:var(--notes-base) !important;
      background:#fff !important;
      color:var(--notes-base) !important;
      font-weight:700;
    }
    .notes-btn-theme-outline:hover,
    .notes-btn-theme-outline:focus{
      border-color:var(--notes-base-hover) !important;
      background:var(--notes-bg) !important;
      color:var(--notes-text) !important;
    }
    .notes-btn-theme-outline:focus-visible{
      outline:0;
      box-shadow:0 0 0 .16rem rgba(161, 98, 7, .16);
    }
    .notes-btn-theme-solid:disabled,
    .notes-btn-theme-outline:disabled{
      opacity:.62;
      box-shadow:none;
    }
    .notes-legacy-tabs{
      max-height:92px;
      overflow:auto;
    }
    .score-warning-row td{
      box-shadow:inset 3px 0 0 #f59f00;
    }
    .score-warning-chip{
      display:inline-flex;
      align-items:center;
      gap:.25rem;
      border:1px solid var(--notes-border);
      border-radius:999px;
      background:var(--notes-bg);
      color:var(--notes-text);
      font-size:.72rem;
      line-height:1.2;
      padding:.12rem .42rem;
      margin-left:.35rem;
      vertical-align:middle;
    }
    .notes-warning-summary{
      border:1px solid var(--notes-border);
      border-radius:8px;
      background:var(--notes-bg);
      padding:.75rem;
    }
    .notes-warning-list{
      display:flex;
      flex-direction:column;
      gap:.5rem;
    }
    .notes-warning-item{
      border:1px solid var(--notes-soft-border);
      border-radius:6px;
      background:#fff;
      padding:.55rem .65rem;
      display:grid;
      grid-template-columns:1fr auto;
      gap:.5rem;
      align-items:center;
    }
    .notes-warning-item-title{
      font-weight:700;
      color:var(--notes-text);
    }
    .notes-warning-item-meta{
      color:var(--notes-muted);
      font-size:.8rem;
      margin-top:.12rem;
    }
    .notes-warning-empty{
      color:#6c757d;
      text-align:center;
      padding:.7rem;
    }
    @media (max-width: 1400px), (max-height: 820px){
      .notes-control-panel{
        padding:.7rem;
        margin-bottom:.65rem;
      }
      .notes-toolbar{
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:.5rem;
      }
      .notes-control-panel .form-control{
        min-height:33px;
        font-size:.84rem;
      }
      .notes-control-panel select.notes-filter-select{
        height:34px;
      }
      .notes-main-shell{
        padding:.55rem;
      }
      .notes-main-head{
        gap:.5rem;
        margin-bottom:.5rem;
      }
      .name-cell{
        min-width:220px;
      }
      .input-num{
        width:92px;
      }
      .input-salt{
        width:50px;
      }
      .table-sticky.table-sm th,
      .table-sticky.table-sm td{
        padding:.28rem .38rem;
      }
    }
    @media (max-width: 992px){
      .notes-toolbar{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 767.98px){
      .notes-page-header{
        align-items:stretch;
      }
      .notes-header-actions,
      .notes-header-actions .btn,
      .notes-header-actions .btn-group{
        width:100%;
      }
      .notes-header-actions .btn{
        flex:1 1 auto;
      }
      .scoring-panel-dropdown .dropdown-menu{
        width:100%;
      }
    }
    @media (max-width: 576px){
      .notes-toolbar{ grid-template-columns:1fr; }
    }

  </style>
