{% load static %}

<style>
  .avatar-helper {
    position: fixed;
    left: 0;
    bottom: 0;
    z-index: 40;
    width: clamp(560px, 52vw, 820px);
    height: min(82vh, 820px);
    pointer-events: none;
    transform: translateX(calc(-100% + 54px));
    transition: transform 260ms ease;
  }

  .avatar-helper.is-open {
    transform: translateX(0);
  }

  .avatar-helper__image {
    position: absolute;
    left: 0;
    bottom: 0;
    width: auto;
    max-width: clamp(260px, 28vw, 500px);
    height: 100%;
    object-fit: contain;
    object-position: bottom left;
  }

  .avatar-helper__bubble {
    position: absolute;
    left: clamp(190px, 20vw, 300px);
    top: clamp(18px, 8vh, 82px);
    width: clamp(240px, 24vw, 350px);
    padding: 16px 18px;
    border: 1px solid rgba(219, 226, 239, 0.94);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 18px 38px rgba(15, 23, 42, 0.14);
    color: #334155;
    backdrop-filter: blur(14px);
    pointer-events: auto;
    transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
  }

  .avatar-helper.is-bubble-hidden .avatar-helper__bubble {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-8px);
    pointer-events: none;
  }

  .avatar-helper__bubble::before {
    content: "";
    position: absolute;
    left: -10px;
    bottom: 28px;
    width: 18px;
    height: 18px;
    border-left: 1px solid rgba(219, 226, 239, 0.94);
    border-bottom: 1px solid rgba(219, 226, 239, 0.94);
    background: rgba(255, 255, 255, 0.94);
    transform: rotate(45deg);
  }

  .avatar-helper__toggle,
  .avatar-helper__hide,
  .avatar-helper__bubble-toggle,
  .avatar-helper__bubble-close {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(219, 226, 239, 0.94);
    background: #ffffff;
    color: #0f172a;
    cursor: pointer;
    pointer-events: auto;
  }

  .avatar-helper__toggle {
    position: absolute;
    right: 0;
    top: clamp(150px, 34vh, 280px);
    width: 54px;
    height: 54px;
    padding: 4px;
    border-radius: 0 8px 8px 0;
    box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
    font-size: 1.1rem;
    font-weight: 850;
    overflow: hidden;
  }

  .avatar-helper.is-open .avatar-helper__toggle {
    opacity: 0;
    pointer-events: none;
  }

  .avatar-helper__hide {
    position: absolute;
    left: 18px;
    bottom: 24px;
    width: 42px;
    height: 42px;
    padding: 4px;
    border-radius: 50%;
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.16);
    font-size: 1rem;
    line-height: 1;
    overflow: hidden;
  }

  .avatar-helper__control-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .avatar-helper__bubble-toggle {
    position: absolute;
    left: clamp(178px, 19vw, 286px);
    top: clamp(18px, 8vh, 82px);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    box-shadow: 0 12px 26px rgba(15, 23, 42, 0.16);
    font-size: 1rem;
    font-weight: 850;
    opacity: 0;
    pointer-events: none;
  }

  .avatar-helper.is-open.is-bubble-hidden .avatar-helper__bubble-toggle {
    opacity: 1;
    pointer-events: auto;
  }

  .avatar-helper__bubble-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 1.1rem;
    line-height: 1;
  }

  .avatar-helper__title {
    display: block;
    margin: 0 28px 6px 0;
    color: #071633;
    font-size: 0.95rem;
    font-weight: 850;
    line-height: 1.2;
  }

  .avatar-helper__message {
    margin: 0;
    color: #64748b;
    font-size: 0.88rem;
    font-weight: 650;
    line-height: 1.42;
  }

  @media (max-width: 1180px) {
    .avatar-helper {
      width: min(100vw, 560px);
      height: 360px;
      transform: translateX(calc(-100% + 50px));
    }

    .avatar-helper__image {
      position: absolute;
      max-width: 220px;
      height: 320px;
    }

    .avatar-helper__bubble {
      left: 166px;
      top: 42px;
      width: min(320px, calc(100vw - 188px));
    }

    .avatar-helper__bubble-toggle {
      left: 154px;
      top: 42px;
    }

    .avatar-helper__toggle {
      width: 50px;
      height: 50px;
      top: 178px;
    }
  }

  @media (max-height: 720px) and (min-width: 1181px) {
    .avatar-helper {
      height: min(76vh, 640px);
    }
  }

  @media (max-width: 560px) {
    .avatar-helper {
      width: 100vw;
      height: 330px;
      transform: translateX(calc(-100% + 48px));
    }

    .avatar-helper__image {
      max-width: 170px;
      height: 270px;
    }

    .avatar-helper__bubble {
      left: 126px;
      top: 36px;
      width: calc(100vw - 146px);
      padding: 14px;
    }

    .avatar-helper__bubble-toggle {
      left: 116px;
      top: 36px;
    }

    .avatar-helper__toggle {
      width: 48px;
      height: 48px;
      top: 166px;
    }

    .avatar-helper__message {
      font-size: 0.82rem;
    }
  }
</style>

{% with avatar_image=image|default:'avatar/greeting_wo_bg.png' avatar_title=title|default:'Benvingut!' avatar_message=message|default:"Soc l'assistent d'IA Score. T'anire ajudant mentre gestiones les competicions." %}
<aside class="avatar-helper avatar-helper--{{ position|default:'left' }}{% if state != 'closed' %} is-open{% endif %}" aria-label="Assistent IA Score">
  <button class="avatar-helper__toggle" type="button" aria-label="Obrir l'assistent" title="Obrir l'assistent" aria-expanded="{% if state != 'closed' %}true{% else %}false{% endif %}">
    <img class="avatar-helper__control-image" src="{% static 'general/avatar_in.png' %}" alt="">
  </button>
  <button class="avatar-helper__hide" type="button" aria-label="Amagar l'assistent" title="Amagar l'assistent">
    <img class="avatar-helper__control-image" src="{% static 'general/avatar_out.png' %}" alt="">
  </button>
  <button class="avatar-helper__bubble-toggle" type="button" aria-label="Mostrar el missatge" title="Mostrar el missatge">
    <img class="avatar-helper__control-image" src="{% static 'general/ask.png' %}" alt="">
  </button>
  <div class="avatar-helper__bubble">
    <button class="avatar-helper__bubble-close" type="button" aria-label="Tancar el missatge" title="Tancar el missatge">&times;</button>
    <strong class="avatar-helper__title">{{ avatar_title }}</strong>
    <p class="avatar-helper__message">{{ avatar_message }}</p>
  </div>
  <img class="avatar-helper__image" src="{% static avatar_image %}" alt="">
</aside>
{% endwith %}

<script>
  (function () {
    var helpers = document.querySelectorAll(".avatar-helper");
    helpers.forEach(function (helper) {
      var openButton = helper.querySelector(".avatar-helper__toggle");
      var hideButton = helper.querySelector(".avatar-helper__hide");
      var bubbleOpenButton = helper.querySelector(".avatar-helper__bubble-toggle");
      var bubbleCloseButton = helper.querySelector(".avatar-helper__bubble-close");
      if (openButton) {
        openButton.addEventListener("click", function () {
          helper.classList.add("is-open");
          openButton.setAttribute("aria-expanded", "true");
        });
      }
      if (hideButton) {
        hideButton.addEventListener("click", function () {
          helper.classList.remove("is-open");
          if (openButton) {
            openButton.setAttribute("aria-expanded", "false");
          }
        });
      }
      if (bubbleOpenButton) {
        bubbleOpenButton.addEventListener("click", function () {
          helper.classList.remove("is-bubble-hidden");
        });
      }
      if (bubbleCloseButton) {
        bubbleCloseButton.addEventListener("click", function () {
          helper.classList.add("is-bubble-hidden");
        });
      }
    });
  })();
</script>
