<script>
(function () {
  'use strict';

  const API = window.InscripcionsApp;
  if (!API) return;

  const defaultColumns = [
    'nom_i_cognoms',
    'document',
    'sexe',
    'data_naixement',
    'entitat',
    'categoria',
    'subcategoria',
    'grup',
    'equip',
    '__aparells__',
    '__media__',
    'ordre_sortida',
    '__actions__',
  ];

  function getColumnItems() {
    return Array.from(document.querySelectorAll('#cols-sortable li[data-col]'));
  }

  function updateColumnCounter() {
    const items = getColumnItems();
    const visible = items.filter((item) => item.querySelector('.js-col-check')?.checked).length;
    const counter = document.getElementById('cols-visible-count');
    if (counter) counter.textContent = `${visible}/${items.length}`;
  }

  function collectTableColumns() {
    return getColumnItems()
      .filter((item) => item.querySelector('.js-col-check')?.checked)
      .map((item) => String(item.getAttribute('data-col') || '').trim())
      .filter(Boolean);
  }

  function setColumnsChecked(resolver) {
    getColumnItems().forEach((item) => {
      const code = String(item.getAttribute('data-col') || '').trim();
      const input = item.querySelector('.js-col-check');
      if (input) input.checked = !!resolver(code);
    });
    updateColumnCounter();
  }

  async function saveTableColumns() {
    const columns = collectTableColumns();
    if (!columns.length) {
      API.showAlert("Has de deixar com a minim una columna seleccionada.");
      return;
    }
    const data = await API.postJson(API.app.urls.saveTableColumns, { table_columns: columns });
    if (!data?.ok) throw new Error("No s'han pogut desar les columnes.");
    API.reloadWithUiState();
  }

  function exportExcel() {
    const url = API.getCurrentUrl();
    url.searchParams.set('export_excel', '1');
    url.searchParams.delete('excel_cols');
    document.querySelectorAll('.js-excel-col:checked').forEach((input) => {
      url.searchParams.append('excel_cols', String(input.value || '').trim());
    });
    window.location.assign(url.toString());
  }

  function initColumnsSortable() {
    const root = document.getElementById('cols-sortable');
    if (!root || typeof window.Sortable === 'undefined') return;
    if (root.dataset.sortableBound === '1') return;
    root.dataset.sortableBound = '1';
    window.Sortable.create(root, {
      animation: 120,
      handle: '.col-drag-handle',
      draggable: 'li[data-col]',
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    initColumnsSortable();
    updateColumnCounter();
    document.querySelectorAll('.js-col-check').forEach((input) => {
      input.addEventListener('change', updateColumnCounter);
    });

    document.getElementById('btn-cols-all')?.addEventListener('click', () => setColumnsChecked(() => true));
    document.getElementById('btn-cols-none')?.addEventListener('click', () => setColumnsChecked((code) => code === 'nom_i_cognoms'));
    document.getElementById('btn-cols-default')?.addEventListener('click', () => setColumnsChecked((code) => defaultColumns.includes(code)));
    document.getElementById('btn-save-cols')?.addEventListener('click', async () => {
      try {
        await saveTableColumns();
      } catch (err) {
        API.showAlert(err.message || err);
      }
    });
    document.getElementById('btn-export-excel')?.addEventListener('click', exportExcel);
  });
})();
</script>
