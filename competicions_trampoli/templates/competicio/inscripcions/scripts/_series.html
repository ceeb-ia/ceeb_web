<script>
{% include "competicio/inscripcions/scripts/_series_workspace_script.html" %}
(function () {
  'use strict';

  const API = window.InscripcionsApp;
  if (!API) return;

  document.addEventListener('inscripcions:panel-activated', (event) => {
    const panelKey = String(event?.detail?.panelKey || '').trim();
    if (panelKey !== 'series-equips') return;
    API.runOnceForPanel('series-equips', () => window.initSeriesWorkspace?.()).catch((error) => {
      API.showAlert(error?.message || error);
    });
  });
})();
</script>
