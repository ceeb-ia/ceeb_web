{% load static %}
{% if competition_dock_items %}
<nav class="competition-dock" aria-label="Navegacio de competicions">
  {% for item in competition_dock_items %}
    <a
      class="competition-dock-item competition-dock-item--{{ item.section }}{% if item.active %} is-active{% endif %}"
      href="{{ item.url }}"
      title="{{ item.label }}"
      aria-label="{{ item.label }}"
      {% if item.active %}aria-current="page"{% endif %}>
      <span class="competition-dock-icon" aria-hidden="true">
        <img src="{% static item.icon_path %}" alt="">
      </span>
      <span class="competition-dock-label">{{ item.label }}</span>
    </a>
  {% endfor %}
  {% if competition_dock_help_topic %}
    <button
      class="competition-dock-help"
      type="button"
      data-avatar-topic="{{ competition_dock_help_topic }}"
      aria-label="Ajuda sobre el flux de la competicio"
      title="Ajuda sobre el flux de la competicio">
      ?
    </button>
  {% endif %}
</nav>
{% endif %}
