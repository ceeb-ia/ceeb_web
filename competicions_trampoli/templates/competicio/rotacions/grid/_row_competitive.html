                  <tr class="franja-row-competitive js-franja-visual-target"
                      data-franja-row="{{ f.id }}"
                      data-franja-visual-row="{{ f.id }}"
                      data-color-raw="{{ f.color_fons|default_if_none:'' }}"
                      draggable="true"
                      style="--franja-bg: {{ f.resolved_background_color }}; --franja-fg: {{ f.resolved_text_color }}; --franja-border: {{ f.resolved_border_color }};">
                    <th class="franja-header-cell">
                      <div class="franja-head">
                        <div class="franja-info">
                          <div class="franja-title"><span class="franja-drag-handle" title="Arrossega per reordenar">&#8942;&#8942;</span>{{ f.display_label|default:"Franja" }}</div>
                          <div class="mini">{{ f.hora_inici }} - {{ f.hora_fi }}</div>
                          <div class="mini mt-1 franja-order-control">
                            <span class="franja-order-label">Ordre</span>
                            <button type="button" class="rot-help-trigger rot-help-trigger--inline" data-rot-help-key="franja_order_mode" aria-label="Ajuda mode ordre franja">?</button>
                            <select class="form-control form-control-sm js-franja-order-mode"
                                    data-fr="{{ f.id }}">
                              {% for opt in order_mode_options %}
                                <option value="{{ opt.value }}">{{ opt.label }}</option>
                              {% endfor %}
                            </select>
                          </div>
                        </div>

                        <div class="dropdown franja-actions">
                          <button class="btn btn-sm btn-light franja-menu-toggle"
                                  type="button"
                                  data-toggle="dropdown"
                                  aria-haspopup="true"
                                  aria-expanded="false"
                                  title="Accions de franja">
                            <span aria-hidden="true">...</span>
                          </button>
                          <div class="dropdown-menu dropdown-menu-right dropdown-menu-end franja-actions-menu">
                            <button type="button" class="dropdown-item rot-help-trigger" data-rot-help-key="franja_actions">Ajuda</button>
                            <button class="dropdown-item js-edit-fr"
                                    data-url="{% url 'rotacions_franja_update_inline' competicio.id f.id %}"
                                    data-titol="{{ f.titol|default_if_none:''|escape }}"
                                    data-hi="{{ f.hora_inici|time:'H:i' }}"
                                    data-hf="{{ f.hora_fi|time:'H:i' }}"
                                    data-tipus="{{ f.tipus }}"
                                    data-color="{{ f.color_fons|default_if_none:'' }}"
                                    type="button">Editar</button>
                            <button class="dropdown-item js-insert-after"
                                    data-fr="{{ f.id }}"
                                    type="button">Inserir despres</button>
                            <button class="dropdown-item js-clear-franja"
                                    data-fr="{{ f.id }}"
                                    type="button">Netejar franja</button>
                            <button class="dropdown-item js-extrapolar"
                                    data-fr="{{ f.id }}"
                                    type="button">Extrapolar</button>
                            <button class="dropdown-item text-danger js-del-fr"
                                    data-fr="{{ f.id }}"
                                    type="button">Eliminar</button>
                          </div>
                        </div>
                      </div>

                    </th>

                    {% for a in estacions %}
                      <td>
                        <div class="cell js-cell" data-franja="{{ f.id }}" data-estacio="{{ a.id }}">
                          <span class="pill empty">-</span>
                        </div>
                      </td>
                    {% endfor %}
                  </tr>
