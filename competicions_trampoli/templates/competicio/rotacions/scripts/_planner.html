(function(){
  let activeFranjaMenu = null;

  function closeFranjaMenu(){
    if (!activeFranjaMenu) return;
    const {dropdown, btn, menu, marker} = activeFranjaMenu;
    menu.classList.remove("show");
    menu.removeAttribute("style");
    dropdown.classList.remove("show");
    if (btn) btn.setAttribute("aria-expanded", "false");
    if (marker && marker.parentNode) {
      marker.parentNode.insertBefore(menu, marker);
      marker.remove();
    } else if (dropdown && dropdown.isConnected) {
      dropdown.appendChild(menu);
    } else {
      menu.remove();
    }
    activeFranjaMenu = null;
  }

  function positionFranjaMenu(btn, menu){
    const btnRect = btn.getBoundingClientRect();
    menu.style.position = "fixed";
    menu.style.display = "block";
    menu.style.visibility = "hidden";
    menu.style.zIndex = "3000";
    menu.style.right = "auto";
    menu.style.bottom = "auto";
    menu.style.float = "none";
    menu.style.transform = "none";
    menu.style.width = "max-content";
    menu.style.minWidth = "190px";
    menu.style.maxWidth = "min(260px, calc(100vw - 16px))";

    const menuRect = menu.getBoundingClientRect();
    const viewportGap = 8;
    const width = menuRect.width || 180;
    const height = menuRect.height || 0;
    const left = Math.min(
      Math.max(viewportGap, btnRect.right - width),
      Math.max(viewportGap, window.innerWidth - width - viewportGap)
    );
    const fitsBelow = btnRect.bottom + height + viewportGap <= window.innerHeight;
    const top = fitsBelow
      ? btnRect.bottom + 4
      : Math.max(viewportGap, btnRect.top - height - 4);

    menu.style.left = `${Math.round(left)}px`;
    menu.style.top = `${Math.round(top)}px`;
    menu.style.visibility = "";
  }

  function openFranjaMenu(dropdown, btn){
    const menu = dropdown.querySelector(".franja-actions-menu");
    if (!menu) return;
    closeFranjaMenu();
    const marker = document.createComment("franja-actions-menu");
    menu.parentNode.insertBefore(marker, menu);
    document.body.appendChild(menu);
    dropdown.classList.add("show");
    menu.classList.add("show");
    btn.setAttribute("aria-expanded", "true");
    activeFranjaMenu = {dropdown, btn, menu, marker};
    positionFranjaMenu(btn, menu);
  }

  document.addEventListener("click", (ev) => {
    const toggle = ev.target.closest(".franja-menu-toggle");
    if (toggle) {
      const dropdown = toggle.closest(".franja-actions.dropdown");
      if (!dropdown) return;
      ev.preventDefault();
      ev.stopPropagation();
      ev.stopImmediatePropagation();
      if (activeFranjaMenu?.btn === toggle) {
        closeFranjaMenu();
      } else {
        openFranjaMenu(dropdown, toggle);
      }
      return;
    }

    if (!activeFranjaMenu) return;
    if (activeFranjaMenu.menu.contains(ev.target)) {
      if (ev.target.closest(".dropdown-item")) window.setTimeout(closeFranjaMenu, 0);
      return;
    }
    closeFranjaMenu();
  }, true);

  document.addEventListener("keydown", (ev) => {
    if (ev.key === "Escape") closeFranjaMenu();
  });
  window.addEventListener("scroll", closeFranjaMenu, true);
  window.addEventListener("resize", closeFranjaMenu);
})();

// --- CSRF ---
function getCookie(name) {
  let v = null;
  if (document.cookie && document.cookie !== "") {
    for (const c of document.cookie.split(";")) {
      const x = c.trim();
      if (x.substring(0, name.length + 1) === (name + "=")) {
        v = decodeURIComponent(x.substring(name.length + 1));
        break;
      }
    }
  }
  return v;
}
const CSRF = getCookie("csrftoken");

// --- POST JSON ---
async function postJSON(url, body){
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": CSRF
    },
    body: JSON.stringify(body || {}),
  });
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  return null;
}

async function postFormData(url, formData){
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "X-CSRFToken": CSRF
    },
    body: formData,
  });
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  return null;
}

let pendingFranjaReorderAccept = null;

function previewRowHtml(item){
  if (!item) return "";
  const title = escapeHtml(item.title || "Franja");
  const oldRange = `${escapeHtml(item.old_start || "")}-${escapeHtml(item.old_end || "")}`;
  const newRange = `${escapeHtml(item.new_start || "")}-${escapeHtml(item.new_end || "")}`;
  const duration = Number(item.duration_minutes || 0);
  return `
    <div class="reorder-preview-item">
      <strong>${title}</strong>
      <div class="mini text-muted">Abans: ${oldRange}</div>
      <div class="mini">Després: ${newRange}</div>
      <div class="mini text-muted">Durada preservada: ${duration} min</div>
    </div>
  `;
}

function showFranjaReorderModal(preview){
  return new Promise((resolve) => {
    const originEl = document.getElementById("franjaReorderOrigin");
    const listEl = document.getElementById("franjaReorderList");
    const acceptBtn = document.getElementById("btnFranjaReorderAccept");
    const modalSelector = "#franjaReorderModal";
    const origin = preview?.origin || {};
    const affected = Array.isArray(preview?.affected) ? preview.affected : [];
    if (originEl) {
      const oldRange = origin.old_start && origin.old_end ? `${escapeHtml(origin.old_start)}-${escapeHtml(origin.old_end)}` : "nou";
      const newRange = `${escapeHtml(origin.new_start || "")}-${escapeHtml(origin.new_end || "")}`;
      originEl.innerHTML = `
        <strong>${escapeHtml(preview?.action_label || "Reordenació horària")}</strong>
        <div class="mini text-muted mt-1">${escapeHtml(origin.title || "Franja")}</div>
        <div class="mini">Abans: ${oldRange}</div>
        <div class="mini">Després: ${newRange}</div>
      `;
    }
    if (listEl) {
      listEl.innerHTML = affected.length
        ? affected.map(previewRowHtml).join("")
        : '<div class="reorder-preview-empty">No hi ha cap altra franja competitiva afectada.</div>';
    }

    pendingFranjaReorderAccept = () => {
      pendingFranjaReorderAccept = null;
      if (window.jQuery) window.jQuery(modalSelector).modal("hide");
      resolve(true);
    };

    if (acceptBtn) {
      acceptBtn.disabled = false;
    }

    if (window.jQuery) {
      const $modal = window.jQuery(modalSelector);
      $modal.off("hidden.bs.modal.reorder");
      $modal.on("hidden.bs.modal.reorder", function () {
        if (pendingFranjaReorderAccept) {
          pendingFranjaReorderAccept = null;
          resolve(false);
        }
        $modal.off("hidden.bs.modal.reorder");
      });
      $modal.modal("show");
    } else {
      if (typeof showAlert === "function") showAlert("No s'ha pogut obrir el modal de confirmació.");
      resolve(false);
    }
  });
}

async function submitFranjaMutation(url, payload){
  const preview = await postJSON(url, {...payload, preview_only: true});
  if (preview?.requires_confirmation) {
    const accepted = await showFranjaReorderModal(preview);
    if (!accepted) return {cancelled: true, preview};
    return await postJSON(url, {...payload, confirm_reorder: true});
  }
  return await postJSON(url, payload);
}

function rotationGridScrollStorageKey(){
  return `rotacions.grid.scroll:{{ competicio.id }}:${window.location.pathname}`;
}

function rotationGridWrap(){
  return document.querySelector(".grid-wrap");
}

function firstVisibleRotationRow(wrap){
  if (!wrap) return null;
  const top = wrap.scrollTop + 24;
  const bottom = wrap.scrollTop + wrap.clientHeight;
  return Array.from(document.querySelectorAll("table.rot tbody tr[data-franja-visual-row], table.rot tbody tr[data-franja-row]"))
    .find((row) => row.offsetTop + row.offsetHeight > top && row.offsetTop < bottom) || null;
}

function firstVisibleRotationStation(wrap){
  if (!wrap) return null;
  const left = wrap.scrollLeft + 250;
  const right = wrap.scrollLeft + wrap.clientWidth;
  return Array.from(document.querySelectorAll("table.rot thead th.js-col-h"))
    .find((th) => th.offsetLeft + th.offsetWidth > left && th.offsetLeft < right) || null;
}

function saveRotationGridScrollState(){
  const wrap = rotationGridWrap();
  if (!wrap) return;
  const row = firstVisibleRotationRow(wrap);
  const station = firstVisibleRotationStation(wrap);
  const payload = {
    savedAt: Date.now(),
    top: wrap.scrollTop || 0,
    left: wrap.scrollLeft || 0,
    franjaId: row ? String(row.dataset.franjaVisualRow || row.dataset.franjaRow || "") : "",
    rowOffset: row ? (row.offsetTop - wrap.scrollTop) : null,
    stationId: station ? String(station.dataset.estacio || "") : "",
    stationOffset: station ? (station.offsetLeft - wrap.scrollLeft) : null,
  };
  try {
    window.sessionStorage.setItem(rotationGridScrollStorageKey(), JSON.stringify(payload));
  } catch (error) {
    // sessionStorage can be unavailable in restricted browsing contexts.
  }
}

function restoreRotationGridScrollState(){
  let payload = null;
  try {
    payload = JSON.parse(window.sessionStorage.getItem(rotationGridScrollStorageKey()) || "null");
    window.sessionStorage.removeItem(rotationGridScrollStorageKey());
  } catch (error) {
    return;
  }
  if (!payload || typeof payload !== "object") return;
  if (!Number.isFinite(Number(payload.savedAt)) || Date.now() - Number(payload.savedAt) > 120000) return;

  const apply = () => {
    const wrap = rotationGridWrap();
    if (!wrap) return;
    let nextTop = Number(payload.top);
    let nextLeft = Number(payload.left);
    const rowOffset = Number(payload.rowOffset);
    const stationOffset = Number(payload.stationOffset);

    if (payload.franjaId && Number.isFinite(rowOffset)) {
      const row = document.querySelector(`table.rot tbody tr[data-franja-visual-row="${payload.franjaId}"], table.rot tbody tr[data-franja-row="${payload.franjaId}"]`);
      if (row) nextTop = row.offsetTop - rowOffset;
    }
    if (payload.stationId && Number.isFinite(stationOffset)) {
      const station = document.querySelector(`table.rot thead th.js-col-h[data-estacio="${payload.stationId}"]`);
      if (station) nextLeft = station.offsetLeft - stationOffset;
    }

    if (Number.isFinite(nextTop)) wrap.scrollTop = Math.max(0, nextTop);
    if (Number.isFinite(nextLeft)) wrap.scrollLeft = Math.max(0, nextLeft);
  };

  requestAnimationFrame(() => requestAnimationFrame(apply));
  window.setTimeout(apply, 140);
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function normalizeGroups(raw){
  if (raw == null || raw === "") return [];
  const arr = Array.isArray(raw) ? raw : [raw];
  const out = [];
  const seen = new Set();
  for (const x of arr){
    const value = String(x ?? "").trim();
    if (!value) continue;
    let key = value;
    if (/^\d+$/.test(value)) key = `g:${value}`;
    if (!/^(g|s|pu):\d+$/.test(key) || seen.has(key)) continue;
    seen.add(key);
    out.push(key);
  }
  return out;
}

function stationModeFor(estacioId){
  return stationModes[String(estacioId)] || {mode: "none", comp_aparell_id: null};
}

function canonicalProgramKey(item){
  if (!item) return "";
  const rawKey = String(item.key || "").trim();
  if (rawKey) return rawKey;
  const id = String(item.id || "").trim();
  if (!id) return "";
  if (String(item.kind || "") === "series") return `s:${id}`;
  if (String(item.kind || "") === "program_unit") return `pu:${id}`;
  return `g:${id}`;
}

function getProgramSidebarItems(){
  return (Array.isArray(groupSidebar) ? groupSidebar : []).map((item) => {
    if (!item || typeof item !== "object") return null;
    const rawKind = String(item.kind || "").toLowerCase();
    const kind = rawKind === "series" ? "series" : (rawKind === "program_unit" ? "program_unit" : "group");
    const key = canonicalProgramKey(item);
    const membersCount = Number(item.members_count || 0);
    const isProgrammed = item.is_programmed != null ? !!item.is_programmed : false;
    const isOutOfProgram = item.is_out_of_program != null ? !!item.is_out_of_program : !isProgrammed;
    return {
      ...item,
      kind,
      key,
      members_count: membersCount,
      is_programmed: isProgrammed,
      is_out_of_program: isOutOfProgram,
      label: String(item.label || item.name || item.titol || item.title || key || ""),
    };
  }).filter(Boolean);
}

function itemAllowedInStation(itemKey, estacioId){
  const mode = stationModeFor(estacioId);
  const key = String(itemKey || "");
  if (!key) return true;
  if (key.startsWith("pu:")){
    const item = getProgramSidebarItems().find((candidate) => String(candidate.key || "") === key);
    if (!item) return false;
    return !!mode.comp_aparell_id && Number(item.app_id || 0) === Number(mode.comp_aparell_id || 0);
  }
  if (mode.mode === "group") return key.startsWith("g:");
  if (mode.mode === "series") return key.startsWith("s:");
  return false;
}

function plannerProgramItemForKey(itemKey){
  const key = String(itemKey || "");
  if (!key) return null;
  return getProgramSidebarItems().find((item) => String(item.key || "") === key) || null;
}

function plannerPillKindLabel(kind){
  if (kind === "series") return "Equip";
  if (kind === "program_unit") return "Fase";
  return "Grup";
}

function cellHtml(fr, es, grups){
  if (!grups.length) return '<span class="pill empty">—</span>';
  return grups.map((g) => {
    const item = plannerProgramItemForKey(g);
    const kind = String(item?.kind || (String(g).startsWith("s:") ? "series" : (String(g).startsWith("pu:") ? "program_unit" : "group")));
    const label = escapeHtml(item?.label || groupLabels[String(g)] || g);
    const meta = escapeHtml(plannerPillKindLabel(kind));
    return `
      <span class="pill program-pill program-pill--${escapeHtml(kind)}" title="${label}">
        <span class="program-pill-main">
          <span class="program-pill-label">${label}</span>
          <span class="program-pill-meta">${meta}</span>
        </span>
        <button type="button" class="pill-rm js-pill-remove" data-franja="${fr}" data-estacio="${es}" data-key="${escapeHtml(g)}" title="Eliminar element">×</button>
      </span>
    `;
  }).join("");
}

function normalizeGridInPlace(){
  for (const fr in grid){
    if (!grid[fr] || typeof grid[fr] !== "object"){
      grid[fr] = {};
      continue;
    }
    for (const es in grid[fr]){
      grid[fr][es] = normalizeGroups(grid[fr][es]);
    }
  }
}

function collectAssignedGroupIds(){
  const assigned = new Set();
  for (const fr in grid){
    for (const es in grid[fr] || {}){
      normalizeGroups(grid[fr][es]).forEach((groupId) => assigned.add(groupId));
    }
  }
  return assigned;
}

function groupChipHtml(item){
  const label = escapeHtml(item?.label || `${item?.kind === "series" ? "Sèrie" : "Grup"} ${item?.id || "?"}`);
  const members = Number(item?.members_count || 0);
  return `
    <div class="chip group-chip" draggable="true" data-key="${escapeHtml(item?.key || "")}" title="${label}">
      <span class="group-chip-label">${label}</span>
      <span class="group-chip-count">${members}</span>
    </div>
  `;
}

function renderGroupBuckets(){
  const programmedWrap = document.getElementById("programmed-group-list");
  const outWrap = document.getElementById("out-of-program-group-list");
  const programmedCountEl = document.getElementById("programmed-groups-count");
  const outCountEl = document.getElementById("out-of-program-groups-count");
  const outGroupsBadge = document.getElementById("out-of-program-groups-badge");
  const outMembersBadge = document.getElementById("out-of-program-members-badge");
  const summary = document.getElementById("out-of-program-summary");
  const summaryText = document.getElementById("out-of-program-summary-text");
  if (!programmedWrap || !outWrap) return;

  const assigned = collectAssignedGroupIds();
  const programmed = [];
  const outOfProgram = [];
  (Array.isArray(groupSidebar) ? groupSidebar : []).forEach((item) => {
    if (!item || !item.id) return;
    if (assigned.has(Number(item.id))) programmed.push(item);
    else outOfProgram.push(item);
  });

  programmedWrap.innerHTML = programmed.length
    ? programmed.map(groupChipHtml).join("")
    : '<div class="group-bucket-empty">Encara no hi ha grups col·locats al programa.</div>';
  outWrap.innerHTML = outOfProgram.length
    ? outOfProgram.map(groupChipHtml).join("")
    : '<div class="group-bucket-empty">No hi ha grups fora de programa.</div>';

  const outGroupCount = outOfProgram.filter((item) => Number(item?.members_count || 0) > 0).length;
  const outMembersCount = outOfProgram.reduce((acc, item) => acc + (Number(item?.members_count || 0) || 0), 0);
  if (programmedCountEl) programmedCountEl.textContent = String(programmed.length);
  if (outCountEl) outCountEl.textContent = String(outGroupCount);
  if (outGroupsBadge) outGroupsBadge.textContent = `${outGroupCount} elements`;
  if (outMembersBadge) outMembersBadge.textContent = `${outMembersCount} subjectes`;
  if (summary) summary.classList.toggle("is-quiet", outGroupCount <= 0);
  if (summaryText) {
    summaryText.textContent = outGroupCount
      ? "Hi ha grups, sèries o blocs de fase que existeixen però encara no formen part de l'horari actual."
      : "Tots els elements programables actuals estan situats dins el programa de rotacions.";
  }

  initChipDnD();
}

function normalizeExportParticipantFieldSelection(raw){
  const available = Array.isArray(exportParticipantFields) ? exportParticipantFields : [];
  const valid = new Set(available.map((f) => String(f.code || "")));
  const input = Array.isArray(raw) ? raw : [];
  const out = [];
  const seen = new Set();
  input.forEach((x) => {
    const code = String(x || "");
    if (!code || !valid.has(code) || seen.has(code)) return;
    seen.add(code);
    out.push(code);
  });
  if (out.length) return out;
  if (valid.has("nom_i_cognoms")) return ["nom_i_cognoms"];
  const first = available[0]?.code;
  return first ? [String(first)] : [];
}

function collectExportParticipantFieldsFromUI(){
  const list = document.getElementById("exportFieldsList");
  if (!list) return normalizeExportParticipantFieldSelection(exportMeta.participant_fields || []);
  const selected = [];
  list.querySelectorAll(".export-field-item").forEach((row) => {
    const code = String(row.dataset.code || "");
    const cb = row.querySelector(".js-export-field-check");
    if (code && cb?.checked) selected.push(code);
  });
  return normalizeExportParticipantFieldSelection(selected);
}

function initExportParticipantFieldDnD(listEl){
  if (!listEl) return;
  let draggedEl = null;

  listEl.querySelectorAll(".export-field-item").forEach((item) => {
    item.addEventListener("dragstart", (ev) => {
      draggedEl = item;
      ev.dataTransfer.effectAllowed = "move";
      ev.dataTransfer.setData("text/plain", item.dataset.code || "");
      item.style.opacity = "0.55";
    });
    item.addEventListener("dragend", () => {
      item.style.opacity = "";
      listEl.querySelectorAll(".export-field-item.is-over").forEach((x) => x.classList.remove("is-over"));
      draggedEl = null;
    });
    item.addEventListener("dragover", (ev) => {
      ev.preventDefault();
      item.classList.add("is-over");
    });
    item.addEventListener("dragleave", () => {
      item.classList.remove("is-over");
    });
    item.addEventListener("drop", (ev) => {
      ev.preventDefault();
      item.classList.remove("is-over");
      if (!draggedEl || draggedEl === item) return;
      const rect = item.getBoundingClientRect();
      const dropAfter = (ev.clientY - rect.top) > (rect.height / 2);
      if (dropAfter) item.insertAdjacentElement("afterend", draggedEl);
      else item.insertAdjacentElement("beforebegin", draggedEl);
    });
  });
}

function renderExportParticipantFieldsChooser(){
  const wrap = document.getElementById("exportFieldsList");
  if (!wrap) return;

  const selected = normalizeExportParticipantFieldSelection(exportMeta.participant_fields || []);
  exportMeta.participant_fields = selected;
  const selectedSet = new Set(selected);
  wrap.innerHTML = "";

  const byCode = new Map((Array.isArray(exportParticipantFields) ? exportParticipantFields : []).map((f) => [String(f.code || ""), f]));
  const orderedCodes = selected.slice();
  (Array.isArray(exportParticipantFields) ? exportParticipantFields : []).forEach((f) => {
    const code = String(f.code || "");
    if (!code || orderedCodes.includes(code)) return;
    orderedCodes.push(code);
  });

  orderedCodes.forEach((code) => {
    const meta = byCode.get(code);
    if (!meta) return;
    const row = document.createElement("div");
    row.className = "export-field-item";
    row.draggable = true;
    row.dataset.code = code;
    row.innerHTML = `
      <div class="export-field-left">
        <span class="export-field-handle" title="Arrossega">&#8942;&#8942;</span>
        <input type="checkbox" class="js-export-field-check" ${selectedSet.has(code) ? "checked" : ""}>
        <span class="export-field-label" title="${escapeHtml(meta.ui_label || meta.label || code)}">${escapeHtml(meta.ui_label || meta.label || code)}</span>
      </div>
      <code class="mini">${escapeHtml(code)}</code>
    `;
    wrap.appendChild(row);
  });

  initExportParticipantFieldDnD(wrap);
}

// --- Autosave ---
async function autoSaveGrid() {
  const cells = [];
  for (const fr in grid) {
    for (const es in grid[fr]) {
      const gs = normalizeGroups(grid[fr][es]);
      cells.push({
        franja: parseInt(fr, 10),
        estacio: parseInt(es, 10),
        items: gs,
      });
    }
  }

  if (statusEl) statusEl.textContent = "Guardant...";
  try {
    await postJSON(SAVE_URL, { cells });
    if (statusEl) statusEl.textContent = "✅ Guardat.";
  } catch (e) {
    if (statusEl) statusEl.textContent = "❌ Error guardant: " + (e.message || e);
  }
}

function renderAll() {
  document.querySelectorAll(".js-cell").forEach((cell) => {
    const fr = cell.dataset.franja;
    const es = cell.dataset.estacio;
    const gs = normalizeGroups(grid[fr] && grid[fr][es] != null ? grid[fr][es] : []);
    if (!grid[fr]) grid[fr] = {};
    grid[fr][es] = gs;
    cell.innerHTML = cellHtml(fr, es, gs);
  });
  renderGroupBuckets();
  setGridDirty(true, "Canvis sense desar.");
}

function collectGridCells(){
  const cells = [];
  for (const fr in grid){
    for (const es in grid[fr]){
      const gs = normalizeGroups(grid[fr][es]);
      cells.push({
        franja: parseInt(fr, 10),
        estacio: parseInt(es, 10),
        items: gs,
      });
    }
  }
  return cells;
}

async function saveGrid(){
  if (isSavingGrid) return;
  const cells = collectGridCells();
  isSavingGrid = true;
  if (statusEl) statusEl.textContent = "Guardant...";
  syncGridSaveState();
  try {
    await postJSON(SAVE_URL, {cells});
    hasUnsavedGridChanges = false;
    syncGridSaveState("Guardat.");
  } catch(e) {
    syncGridSaveState("Error guardant: " + (e.message || e));
  } finally {
    isSavingGrid = false;
    syncGridSaveState();
  }
}

async function autoSaveGrid(){
  return saveGrid();
}

// --- Column DnD (headers) ---
let dragColEstacioId = null;

function getColIndexByEstacioId(estacioId){
  const headers = Array.from(document.querySelectorAll("table.rot thead th.js-col-h"));
  return headers.findIndex(h => h.dataset.estacio === String(estacioId));
}

function moveColumn(fromIdx, toIdx){
  if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0) return;
  const table = document.querySelector("table.rot");
  if (!table) return;

  const rows = Array.from(table.rows);
  rows.forEach((row) => {
    const cells = Array.from(row.cells);
    const a = cells[fromIdx + 1]; // +1 per saltar "Franja"
    const b = cells[toIdx + 1];
    if (!a || !b) return;

    if (fromIdx < toIdx) b.insertAdjacentElement("afterend", a);
    else b.insertAdjacentElement("beforebegin", a);
  });
}

async function persistColumnOrder(){
  const ids = Array.from(document.querySelectorAll("table.rot thead th.js-col-h"))
    .map(th => parseInt(th.dataset.estacio, 10))
    .filter(Boolean);

  await postJSON(REORDER_COLS_URL, {order: ids});
}

function initColumnDnD(){
  document.querySelectorAll("table.rot thead th.js-col-h").forEach((th) => {
    th.addEventListener("dragstart", (ev) => {
      dragColEstacioId = th.dataset.estacio;
      ev.dataTransfer.effectAllowed = "move";
      ev.dataTransfer.setData("text/plain", dragColEstacioId);
      th.style.opacity = "0.6";
    });

    th.addEventListener("dragend", () => {
      dragColEstacioId = null;
      th.style.opacity = "";
    });

    th.addEventListener("dragover", (ev) => {
      ev.preventDefault();
      ev.dataTransfer.dropEffect = "move";
      th.style.outline = "2px dashed #94a3b8";
      th.style.outlineOffset = "2px";
    });

    th.addEventListener("dragleave", () => {
      th.style.outline = "";
      th.style.outlineOffset = "";
    });

    th.addEventListener("drop", async (ev) => {
      ev.preventDefault();
      th.style.outline = "";
      th.style.outlineOffset = "";

      const fromId = dragColEstacioId || ev.dataTransfer.getData("text/plain");
      const toId = th.dataset.estacio;
      if (!fromId || !toId || fromId === toId) return;

      const fromIdx = getColIndexByEstacioId(fromId);
      const toIdx = getColIndexByEstacioId(toId);

      moveColumn(fromIdx, toIdx);

      if (statusEl) statusEl.textContent = "Guardant ordre columnes...";
      try {
        await persistColumnOrder();
        if (statusEl) statusEl.textContent = "✅ Ordre columnes guardat.";
      } catch(e){
        if (statusEl) statusEl.textContent = "❌ Error guardant ordre: " + (e.message || e);
      }
    });
  });
}

function initChipDnD(){

    chip.addEventListener("dragstart", (ev) => {

      ev.dataTransfer.setData("text/plain", key);
      ev.dataTransfer.setData(DND_PROGRAM_ITEM_MIME, key);
    });

}

function initCellDnD(){
  document.querySelectorAll(".js-cell").forEach((cell) => {
    cell.addEventListener("dragover", (ev) => {
      ev.preventDefault();
      cell.classList.add("is-over");
    });
    cell.addEventListener("dragleave", () => cell.classList.remove("is-over"));
    cell.addEventListener("drop", (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      cell.classList.remove("is-over");

      const itemKey = ev.dataTransfer.getData(DND_PROGRAM_ITEM_MIME) || ev.dataTransfer.getData("text/plain"); // "" => buida
      const fr = cell.dataset.franja;
      const es = cell.dataset.estacio;

      if (!grid[fr]) grid[fr] = {};
      if (itemKey === "") {
        grid[fr][es] = [];
      } else {
        const current = normalizeGroups(grid[fr][es]);
        const key = normalizeGroups([itemKey])[0];
        if (!key) return;
        if (!itemAllowedInStation(key, es)){
          showAlert("Aquest element no es pot col.locar en aquesta estacio.");
          return;
        }
        if (!current.includes(key)) current.push(key);
        grid[fr][es] = current;
      }
      renderAll();
    });
  });
}

function defaultFranjaColor(tipus){
  const key = String(tipus || "competition");
  return String(franjaDefaultColors[key] || franjaDefaultColors.competition || "#DBEAFE").toUpperCase();
}

function normalizeFranjaColorValue(value, tipus){
  const raw = String(value || "").trim();
  return /^#[0-9A-Fa-f]{6}$/.test(raw) ? raw.toUpperCase() : defaultFranjaColor(tipus);
}

  }
}

  const input = document.getElementById("editFrColor");

  const tipus = document.getElementById("ftype")?.value || "competition";
  const input = document.getElementById("fcolor");

  return normalizeFranjaColorValue(input.value, tipus);
}

function addMinutesToTime(value, minutesToAdd){
  const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
  let startMinutes = 9 * 60;
  if (match) {
    const hours = Number(match[1]);
    const minutes = Number(match[2]);
    if (Number.isFinite(hours) && Number.isFinite(minutes) && hours >= 0 && hours < 24 && minutes >= 0 && minutes < 60) {
      startMinutes = (hours * 60) + minutes;
    }
  }
  const endMinutes = Math.min((24 * 60) - 1, startMinutes + minutesToAdd);
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(Math.floor(endMinutes / 60))}:${pad(endMinutes % 60)}`;
}

function firstFranjaCreatePayload(){
  const hora_inici = (document.getElementById("hi")?.value || "").trim() || "09:00";
  const hora_fi = (document.getElementById("hf")?.value || "").trim() || addMinutesToTime(hora_inici, 20);
  return {
    hora_inici,
    hora_fi,
    titol: document.getElementById("ft")?.value || "",
    tipus: document.getElementById("ftype")?.value || "competition",
    color_fons: currentAddFranjaColorPayload(),
  };
}

  const input = document.getElementById("editFrColor");

}

}

    });
  });

// --- Click handler global (accions dins la taula) ---
function initGlobalClickHandler(){
  document.addEventListener("click", async (ev) => {
    // deixa que Bootstrap 4 obri dropdowns
    if (ev.target.closest('[data-toggle="dropdown"]')) return;

    const removePillBtn = ev.target.closest(".js-pill-remove");
    if (removePillBtn){
      const fr = removePillBtn.dataset.franja;
      const es = removePillBtn.dataset.estacio;
      const g = String(removePillBtn.dataset.key || "");
      if (!fr || !es || !g) return;
      if (!grid[fr]) grid[fr] = {};
      grid[fr][es] = normalizeGroups(grid[fr][es]).filter((x) => x !== g);
      renderAll();
      return;
    }

    const createFirstFranjaBtn = ev.target.closest(".js-create-first-franja");
    if (createFirstFranjaBtn){
      try{
        await createFirstFranjaFromGrid();
      } catch(e){
        showAlert("Error creant primera franja: " + (e.message || e));
      }
      return;
    }

    // EDITAR FRANJA (obre modal)
    const editBtn = ev.target.closest(".js-edit-fr");
    if (editBtn){
      editFrUrl = editBtn.dataset.url;

      const t = document.getElementById("editFrTitol");
      const tipus = document.getElementById("editFrTipus");
      const hi = document.getElementById("editFrHi");
      const hf = document.getElementById("editFrHf");
      const color = document.getElementById("editFrColor");
      const rawColor = editBtn.dataset.color || editBtn.closest("[data-color-raw]")?.dataset.colorRaw || "";

      if (t) t.value = editBtn.dataset.titol || "";
      if (tipus) tipus.value = editBtn.dataset.tipus || "competition";
      if (hi) hi.value = editBtn.dataset.hi || "";
      if (hf) hf.value = editBtn.dataset.hf || "";
      editFrUsesDefaultColor = !rawColor;
      if (color) color.value = normalizeFranjaColorValue(rawColor, editBtn.dataset.tipus || "competition");
      syncEditFranjaColorInput();

      if (window.jQuery) {
        window.jQuery("#editFrModal").modal("show");
      } else {
        showAlert("No hi ha jQuery carregat (Bootstrap 4 necessita jQuery).");
      }
      return;
    }

    // DESAR FRANJA (botó dins modal)
    const saveModalBtn = ev.target.closest("#btnEditFrSave");
    if (saveModalBtn){
      const titol = document.getElementById("editFrTitol")?.value || "";
      const tipus = document.getElementById("editFrTipus")?.value || "competition";
      const hora_inici = document.getElementById("editFrHi")?.value || "";
      const hora_fi = document.getElementById("editFrHf")?.value || "";
      const color_fons = currentEditFranjaColorPayload();

      try{
        const resp = await submitFranjaMutation(editFrUrl, {titol, tipus, hora_inici, hora_fi, color_fons});
        if (resp?.cancelled) return;
        if (window.jQuery) window.jQuery("#editFrModal").modal("hide");
        reloadRotacionsPreservingGridScroll();
      } catch(e){
        showAlert("Error guardant franja: " + (e.message || e));
      }
      return;
    }

    // NETEJAR FRANJA (cel·les a buides)
    const clearBtn = ev.target.closest(".js-clear-franja");
    if (clearBtn && clearBtn.dataset.fr) {
      const frId = clearBtn.dataset.fr;
      if (!await showConfirm("Netejar totes les caselles d'aquesta franja?")) return;
      if (!grid[frId]) grid[frId] = {};
      for (const es of Object.keys(grid[frId])) grid[frId][es] = [];
      renderAll();
      return;
    }

    // EXTRAPOLAR
    const exBtn = ev.target.closest(".js-extrapolar");
    const ex = exBtn?.dataset?.fr;
    if (ex){
      const countStr = await showPrompt("Quantes franges següents vols omplir?", "");
      if (countStr === null) return;
      const count = (countStr.trim() === "") ? null : parseInt(countStr, 10);

      if (statusEl) statusEl.textContent = "Guardant i extrapolant...";

      try {
        // autosave abans
        const cells = [];
        for (const fr in grid){
          for (const es in grid[fr]){
            const gs = normalizeGroups(grid[fr][es]);
            cells.push({
              franja: parseInt(fr, 10),
              estacio: parseInt(es, 10),
              items: gs,
            });
          }
        }
        await postJSON(SAVE_URL, {cells});
        setGridDirty(false, "Guardat.");

        const r = await postJSON(extrapolarUrl(ex), {count});
        if (statusEl) statusEl.textContent = `✅ Extrapolat. Franges creades: ${r?.created_franges ?? "?"}, cel·les omplertes: ${r?.filled ?? "?"}.`;
        reloadRotacionsPreservingGridScroll();
      } catch(e){
        showAlert("Error extrapolant: " + (e.message || e));
        if (statusEl) statusEl.textContent = "❌ Error extrapolant: " + (e.message || e);
      }
      return;
    }

    // INSERT AFTER
    const insBtn = ev.target.closest(".js-insert-after");
    const ins = insBtn?.dataset?.fr;
    if (ins){
      try{
        const resp = await submitFranjaMutation(insertAfterUrl(ins), {});
        if (resp?.cancelled) return;
        reloadRotacionsPreservingGridScroll();
      } catch(e){
        showAlert("Error inserint franja: " + (e.message || e));
      }
      return;
    }

    // DELETE FRANJA
    const delFrBtn = ev.target.closest(".js-del-fr");
    const fr = delFrBtn?.dataset?.fr;
    if (fr){
      if (!await showConfirm("Eliminar franja?")) return;
      try {
        await postJSON(delFrUrl(fr), {});
        reloadRotacionsPreservingGridScroll();
      } catch(e){
        showAlert(e.message || e);
      }
      return;
    }

    // DELETE ESTACIÓ
    const delEsBtn = ev.target.closest(".js-del-es");
    const es = delEsBtn?.dataset?.es;
    if (es){
      if (!await showConfirm("Eliminar estació?")) return;
      try {
        await postJSON(delEstacioUrl(es), {});
        reloadRotacionsPreservingGridScroll();
      } catch(e){
        showAlert(e.message || e);
      }
      return;
    }
  });
}

// --- Planner drawer and filtered sidebar overrides ---
function collectAssignedProgramKeys(){
  const assigned = new Set();
  for (const fr in grid){
    for (const es in grid[fr] || {}){
      normalizeGroups(grid[fr][es]).forEach((key) => assigned.add(String(key)));
    }
  }
  return assigned;
}

function getProgramBuckets(){
  const assigned = collectAssignedProgramKeys();
  const programmed = [];
  const outOfProgram = [];
  getProgramSidebarItems().forEach((item) => {
    if (!item) return;
    const key = String(item.key || canonicalProgramKey(item));
    if (!key) return;
    const isProgrammed = assigned.has(item.key || key);
    const normalized = {
      ...item,
      key,
      is_programmed: isProgrammed,
      is_out_of_program: !isProgrammed,
    };
    if (isProgrammed) programmed.push(normalized);
    else outOfProgram.push(normalized);
  });
  return { assigned, programmed, outOfProgram };
}

function getActiveStationMode(){
  const activeStationId = String(programFilters.activeStationId || "").trim();
  return activeStationId ? stationModeFor(activeStationId) : null;
}

function itemMatchesPlannerFilters(item){
  if (!item) return false;
  const query = String(programFilters.query || "").trim().toLowerCase();
  const mode = getActiveStationMode();
  const kindFilter = String(programFilters.kind || "all");

  if (kindFilter !== "all" && String(item.kind || "") !== kindFilter) return false;
  if (programFilters.nonEmptyOnly && Number(item.members_count || 0) <= 0) return false;
  if (mode){
    if (item.kind === "program_unit"){
      if (!mode.comp_aparell_id || Number(item.app_id || 0) !== Number(mode.comp_aparell_id || 0)) return false;
    } else {
      if (mode.mode === "group" && item.kind !== "group") return false;
      if (mode.mode === "series" && item.kind !== "series") return false;
    }
  }
  if (query){
    const haystack = [
      item.label,
      item.key,
      item.kind,
      item.id,
      item.app_id,
      item.members_count,
      item.is_programmed ? "programat" : "fora",
    ].map((x) => String(x ?? "").toLowerCase()).join(" ");
    if (!haystack.includes(query)) return false;
  }
  return true;
}

function splitPlannerItemsByKind(items){
  const groups = [];
  const series = [];
  const units = [];
  (Array.isArray(items) ? items : []).forEach((item) => {
    if (!item) return;
    if (item.kind === "series") series.push(item);
    else if (item.kind === "program_unit") units.push(item);
    else groups.push(item);
  });
  return { groups, series, units };
}

function renderPlannerSummary(){
  const summary = document.getElementById("out-of-program-summary");
  const summaryText = document.getElementById("out-of-program-summary-text");
  const outGroupsBadge = document.getElementById("out-of-program-groups-badge");
  const outMembersBadge = document.getElementById("out-of-program-members-badge");
  const state = getProgramBuckets();
  const outGroupCount = state.outOfProgram.filter((item) => Number(item?.members_count || 0) > 0).length;
  const outMembersCount = state.outOfProgram.reduce((acc, item) => acc + (Number(item?.members_count || 0) || 0), 0);
  if (summary) summary.classList.toggle("is-quiet", outGroupCount <= 0);
  if (summaryText) {
    summaryText.textContent = outGroupCount
      ? "Hi ha grups, sèries o blocs de fase que existeixen però encara no formen part de l'horari actual."
      : "Tots els elements programables actuals estan situats dins el programa de rotacions.";
  }
  if (outGroupsBadge) outGroupsBadge.textContent = `${outGroupCount} elements`;
  if (outMembersBadge) outMembersBadge.textContent = `${outMembersCount} subjectes`;
}

function isPlannerToolbarOpen(){
  const toolbar = document.getElementById("rotation-toolbar");

}

function readStoredPlannerToolbarOpen(){
  try {
    const value = window.localStorage.getItem(PLANNER_TOOLBAR_OPEN_STORAGE_KEY);
    if (value === "0") return false;
    if (value === "1") return true;
  } catch (error) {
    // localStorage can be unavailable in restricted browsing contexts.
  }
  return true;
}

function writeStoredPlannerToolbarOpen(open){
  try {
    window.localStorage.setItem(PLANNER_TOOLBAR_OPEN_STORAGE_KEY, open ? "1" : "0");
  } catch (error) {
    // localStorage can be unavailable in restricted browsing contexts.
  }
}

function setPlannerToolbarOpen(open, options){
  const opts = options || {};
  const toolbar = document.getElementById("rotation-toolbar");
  const collapseBtn = document.getElementById("rotation-toolbar-collapse");
  const panels = document.getElementById("rotation-toolbar-panels");
  const shouldOpen = !!open;
  if (toolbar) toolbar.classList.toggle("is-collapsed", !shouldOpen);
  if (collapseBtn) {
    collapseBtn.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
    collapseBtn.textContent = shouldOpen ? "Amagar" : "Mostrar";
  }
  if (panels) panels.setAttribute("aria-hidden", shouldOpen ? "false" : "true");
  if (!opts.skipSave) writeStoredPlannerToolbarOpen(shouldOpen);
  syncPlannerDrawerPanels();
}

let draggedFranjaRowId = null;
let draggedVisualFranjaRowId = null;

function initFranjaRowDnD(){
  document.querySelectorAll(".franja-row-competitive").forEach((row) => {
    row.addEventListener("dragstart", (ev) => {
      draggedFranjaRowId = row.dataset.franjaRow || null;
      ev.dataTransfer.effectAllowed = "move";
      ev.dataTransfer.setData(DND_FRANJA_ROW_MIME, draggedFranjaRowId || "");
      row.style.opacity = "0.55";
    });
    row.addEventListener("dragend", () => {
      draggedFranjaRowId = null;
      row.style.opacity = "";
      document.querySelectorAll(".franja-row-competitive.is-drag-target").forEach((node) => node.classList.remove("is-drag-target"));
    });
    row.addEventListener("dragover", (ev) => {
      ev.preventDefault();
      row.classList.add("is-drag-target");
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("is-drag-target");
    });
    row.addEventListener("drop", async (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      row.classList.remove("is-drag-target");
      const targetId = row.dataset.franjaRow || "";
      const fromId = draggedFranjaRowId || ev.dataTransfer.getData(DND_FRANJA_ROW_MIME);
      if (!fromId) return;
      if (!fromId || !targetId || fromId === targetId) return;
      const rect = row.getBoundingClientRect();
      const position = (ev.clientY - rect.top) > (rect.height / 2) ? "after" : "before";
      try {
        await submitFranjaMutation(REORDER_FRANGES_URL, {
          dragged_id: parseInt(fromId, 10),
          target_id: parseInt(targetId, 10),
          position,
        });
        reloadRotacionsPreservingGridScroll();
      } catch (e) {
        showAlert("Error reordenant franges: " + (e.message || e));
      }
    });
  });
}

function clearVisualFranjaTargets(){
  document.querySelectorAll(".js-franja-visual-target.is-visual-target-before, .js-franja-visual-target.is-visual-target-after").forEach((node) => {
    node.classList.remove("is-visual-target-before", "is-visual-target-after");
  });
}

function setVisualFranjaTargetState(row, clientY){
  if (!row) return "before";
  clearVisualFranjaTargets();
  const rect = row.getBoundingClientRect();
  const position = (clientY - rect.top) > (rect.height / 2) ? "after" : "before";
  row.classList.add(position === "after" ? "is-visual-target-after" : "is-visual-target-before");
  return position;
}

function initVisualFranjaRowDnD(){
  document.querySelectorAll(".franja-row-global").forEach((row) => {
    row.addEventListener("dragstart", (ev) => {
      draggedVisualFranjaRowId = row.dataset.franjaVisualRow || null;
      row.classList.add("is-visual-dragging");
      ev.dataTransfer.effectAllowed = "move";
      ev.dataTransfer.setData(DND_FRANJA_VISUAL_ROW_MIME, draggedVisualFranjaRowId || "");
    });
    row.addEventListener("dragend", () => {
      draggedVisualFranjaRowId = null;
      row.classList.remove("is-visual-dragging");
      clearVisualFranjaTargets();
    });
  });

  document.querySelectorAll(".js-franja-visual-target").forEach((row) => {
    row.addEventListener("dragover", (ev) => {
      const fromId = draggedVisualFranjaRowId || ev.dataTransfer.getData(DND_FRANJA_VISUAL_ROW_MIME);
      if (!fromId) return;
      ev.preventDefault();
      setVisualFranjaTargetState(row, ev.clientY);
    });
    row.addEventListener("dragleave", (ev) => {
      if (!row.contains(ev.relatedTarget)) {
        row.classList.remove("is-visual-target-before", "is-visual-target-after");
      }
    });
    row.addEventListener("drop", async (ev) => {
      const fromId = draggedVisualFranjaRowId || ev.dataTransfer.getData(DND_FRANJA_VISUAL_ROW_MIME);
      if (!fromId) return;
      ev.preventDefault();
      ev.stopPropagation();
      const targetId = row.dataset.franjaVisualRow || "";
      const position = setVisualFranjaTargetState(row, ev.clientY);
      clearVisualFranjaTargets();
      if (!targetId || !fromId || fromId === targetId) return;
      try {
        await postJSON(REORDER_VISUAL_FRANGES_URL, {
          dragged_id: parseInt(fromId, 10),
          target_id: parseInt(targetId, 10),
          position,
        });
        reloadRotacionsPreservingGridScroll();
      } catch (e) {
        showAlert("Error reordenant visualment les franges globals: " + (e.message || e));
      }
    });
  });
}

function renderProgramables(){
  const programmedWrap = document.getElementById("programmed-group-list");
  const programmedSeriesWrap = document.getElementById("programmed-series-list");
  const programmedUnitWrap = document.getElementById("programmed-unit-list");
  const outWrap = document.getElementById("out-of-program-group-list");
  const outSeriesWrap = document.getElementById("out-of-program-series-list");
  const outUnitWrap = document.getElementById("out-of-program-unit-list");
  const programmedBucket = document.getElementById("programmed-bucket");
  const outBucket = document.getElementById("out-of-program-bucket");
  const programmedCountEl = document.getElementById("programmed-groups-count");
  const programmedGroupsKindCountEl = document.getElementById("programmed-groups-kind-count");
  const programmedSeriesKindCountEl = document.getElementById("programmed-series-kind-count");
  const programmedUnitsKindCountEl = document.getElementById("programmed-units-kind-count");
  const outCountEl = document.getElementById("out-of-program-groups-count");
  const outGroupsKindCountEl = document.getElementById("out-of-program-groups-kind-count");
  const outSeriesKindCountEl = document.getElementById("out-of-program-series-kind-count");
  const outUnitsKindCountEl = document.getElementById("out-of-program-units-kind-count");
  const state = getProgramBuckets();
  const placementFilter = String(programFilters.placement || "all");
  const programmedVisible = state.programmed.filter(itemMatchesPlannerFilters);
  const outVisible = state.outOfProgram.filter(itemMatchesPlannerFilters);
  const programmedSplit = splitPlannerItemsByKind(programmedVisible);
  const outSplit = splitPlannerItemsByKind(outVisible);

  if (programmedBucket) programmedBucket.hidden = placementFilter === "out";
  if (outBucket) outBucket.hidden = placementFilter === "programmed";

  if (programmedWrap) {
    programmedWrap.innerHTML = programmedSplit.groups.length
      ? programmedSplit.groups.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">Encara no hi ha grups col·locats al programa.</div>';
  }
  if (programmedSeriesWrap) {
    programmedSeriesWrap.innerHTML = programmedSplit.series.length
      ? programmedSplit.series.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">Encara no hi ha equips col·locats al programa.</div>';
  }
  if (programmedUnitWrap) {
    programmedUnitWrap.innerHTML = programmedSplit.units.length
      ? programmedSplit.units.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">Encara no hi ha blocs de fase col·locats al programa.</div>';
  }
  if (outWrap) {
    outWrap.innerHTML = outSplit.groups.length
      ? outSplit.groups.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">No hi ha grups fora de programa.</div>';
  }
  if (outSeriesWrap) {
    outSeriesWrap.innerHTML = outSplit.series.length
      ? outSplit.series.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">No hi ha equips fora de programa.</div>';
  }

  if (outUnitWrap) {
    outUnitWrap.innerHTML = outSplit.units.length
      ? outSplit.units.map(groupChipHtml).join("")
      : '<div class="group-bucket-empty">No hi ha blocs de fase fora de programa.</div>';
  }

  if (programmedCountEl) programmedCountEl.textContent = String(programmedVisible.length);
  if (programmedGroupsKindCountEl) programmedGroupsKindCountEl.textContent = String(programmedSplit.groups.length);
  if (programmedSeriesKindCountEl) programmedSeriesKindCountEl.textContent = String(programmedSplit.series.length);
  if (programmedUnitsKindCountEl) programmedUnitsKindCountEl.textContent = String(programmedSplit.units.length);
  if (outCountEl) outCountEl.textContent = String(outVisible.filter((item) => Number(item?.members_count || 0) > 0).length);
  if (outGroupsKindCountEl) outGroupsKindCountEl.textContent = String(outSplit.groups.length);
  if (outSeriesKindCountEl) outSeriesKindCountEl.textContent = String(outSplit.series.length);
  if (outUnitsKindCountEl) outUnitsKindCountEl.textContent = String(outSplit.units.length);

  const searchInput = document.getElementById("programSearch");
  if (searchInput && searchInput.value !== programFilters.query) {
    searchInput.value = programFilters.query;
  }

  updateFilterButtons();
  initChipDnD();
}

    btn.addEventListener("click", () => {
      const nextPanel = btn.dataset.drawerPanelTarget || "programables";
      const isSamePanel = String(nextPanel) === String(activePlannerDrawerPanel || "programables");
      if (isSamePanel && isPlannerToolbarOpen()) {
        setPlannerToolbarOpen(false);
        return;
      }
      setPlannerDrawerPanel(nextPanel);
    });
  });

}

function initStationFocusHandlers(){
  document.querySelectorAll(".js-col-h").forEach((th) => {
    th.addEventListener("click", (ev) => {
      if (ev.target.closest(".js-del-es")) return;
      toggleActiveStation(th.dataset.estacio || null);
    });
  });

  document.querySelectorAll(".js-cell").forEach((cell) => {
    cell.addEventListener("click", () => setActiveStation(cell.dataset.estacio || null));
  });

  document.addEventListener("click", (ev) => {
    if (!programFilters.activeStationId) return;
    if (ev.target.closest("table.rot")) return;
    if (ev.target.closest(".rotation-toolbar")) return;
    clearActiveStation();
  });
}

// --- INIT ---
document.addEventListener("DOMContentLoaded", () => {
  // Dropdown Excel (forçat manualment per evitar conflictes de versions Bootstrap)
  const exportToggle = document.querySelector(".js-export-dd-toggle");
  const exportWrap = exportToggle ? exportToggle.closest(".dropdown") : null;
  const exportMenu = exportWrap ? exportWrap.querySelector(".dropdown-menu") : null;
  if (exportToggle && exportMenu) {
    exportToggle.addEventListener("click", (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const isOpen = exportMenu.classList.contains("show");
      exportMenu.classList.toggle("show", !isOpen);
      exportWrap.classList.toggle("show", !isOpen);
      exportToggle.setAttribute("aria-expanded", isOpen ? "false" : "true");
    });

    document.addEventListener("click", (ev) => {
      if (!exportWrap.contains(ev.target)) {
        exportMenu.classList.remove("show");
        exportWrap.classList.remove("show");
        exportToggle.setAttribute("aria-expanded", "false");
      }
    });

    exportMenu.querySelectorAll("a.dropdown-item").forEach((a) => {
      a.addEventListener("click", () => {
        exportMenu.classList.remove("show");
        exportWrap.classList.remove("show");
        exportToggle.setAttribute("aria-expanded", "false");
      });
    });

    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") {
        exportMenu.classList.remove("show");
        exportWrap.classList.remove("show");
        exportToggle.setAttribute("aria-expanded", "false");
      }
    });
  }

  initEditModalPlacement();
  initReorderModalControls();
  initFranjaColorControls();
  initColumnDnD();
  initFranjaRowDnD();
  initVisualFranjaRowDnD();
  initChipDnD();
  initCellDnD();
  initTopButtons();
  initOutOfProgramVisibilityToggle();
  initFranjaOrderModes();
  initExportMetaControls();
  initGlobalClickHandler();
  initPlannerDrawerControls();
  initStationFocusHandlers();

  renderAll({save:false});
  restoreRotationGridScrollState();
});
</script>
