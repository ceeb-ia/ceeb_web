{% load static %}

<header class="phase-dashboard-header" data-avatar-anchor="phase-header">
  <div class="phase-dashboard-title">
    <div class="phase-dashboard-title-row">
      <span class="phase-dashboard-title-logo" aria-hidden="true">
        <img src="{% static 'dock/fases.png' %}" alt="">
      </span>
      <h1>Aparells i fases</h1>
      <button class="btn btn-sm btn-outline-secondary phase-context-help" type="button" data-avatar-topic="competition_apparatus_phases" aria-label="Ajuda sobre aparells i fases" title="Ajuda sobre aparells i fases">?</button>
    </div>
    <div class="text-muted small phase-dashboard-subtitle">
      <span class="phase-dashboard-context-main">{{ competicio.nom }}</span> - defineix rondes per aparell, unitats competitives i el pas cap a rotacions.
    </div>
    <div class="phase-dashboard-stats" aria-label="Resum de fases">
      <span class="phase-stat">
        <span class="phase-stat-value">{{ comp_aparells|length }}</span>
        <span class="phase-stat-label">Aparells</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_phase_count }}</span>
        <span class="phase-stat-label">Fases</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_unit_count }}</span>
        <span class="phase-stat-label">Unitats</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_pending_unit_count }}</span>
        <span class="phase-stat-label">Sense rotacio</span>
      </span>
    </div>
  </div>
</header>
