{% load static %}

<header class="phase-dashboard-header">
  <div class="phase-dashboard-title">
    <div class="phase-dashboard-title-row">
      <img class="phase-dashboard-title-logo" src="{% static 'dock/fases.png' %}" alt="">
      <h2>Aparells i fases</h2>
    </div>
    <div class="text-muted small phase-dashboard-subtitle">{{ competicio.nom }} - defineix rondes per aparell, unitats competitives i el pas cap a rotacions.</div>
    <div class="phase-dashboard-stats" aria-label="Resum de fases">
      <span class="phase-stat">
        <span class="phase-stat-value">{{ comp_aparells|length }}</span>
        <span class="phase-stat-label">Aparells</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_phase_count }}</span>
        <span class="phase-stat-label">Fases</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_unit_count }}</span>
        <span class="phase-stat-label">Unitats</span>
      </span>
      <span class="phase-stat">
        <span class="phase-stat-value">{{ total_pending_unit_count }}</span>
        <span class="phase-stat-label">Sense rotacio</span>
      </span>
    </div>
  </div>
</header>
