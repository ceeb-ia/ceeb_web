{% if app_summaries %}
  <nav class="phase-app-tabs" aria-label="Aparells amb fases">
    {% for summary in app_summaries %}
      <a class="phase-app-tab {% if summary.app.id == selected_app_id %}is-active{% endif %}"
         href="{% url 'trampoli_fases' competicio.id %}?app={{ summary.app.id }}">
        <span class="phase-app-tab-title">{{ summary.app.display_nom }}</span>
        <span class="phase-app-tab-detail">
          {{ summary.phase_count }} fases - {{ summary.unit_count }} unitats - {{ summary.state_label }}
        </span>
      </a>
    {% endfor %}
  </nav>
{% endif %}
