<details class="phase-child-create">
  <summary class="phase-child-create-toggle">+ Crear fase filla</summary>
  <form method="post" class="phase-child-create-form">
    {% csrf_token %}
    <input type="hidden" name="action" value="create_phase">
    <input type="hidden" name="parent" value="{{ parent_id|default:'' }}">
    <input type="hidden" name="estat" value="planned">
    <div class="phase-child-create-fields">
      <label class="phase-child-create-field">
        <span>Nom</span>
        <input class="form-control form-control-sm" type="text" name="nom" placeholder="Ex: Semifinal" required>
      </label>
      <label class="phase-child-create-field">
        <span>Codi</span>
        <input class="form-control form-control-sm" type="text" name="codi" placeholder="Ex: SEMI" required>
      </label>
      <button class="btn btn-sm btn-primary" type="submit">Crear</button>
    </div>
  </form>
</details>
