<style>
  .phase-dashboard-shell {
    --phase-base: #2563EB;
    --phase-soft: #EFF6FF;
    --phase-border: #BFDBFE;
    --phase-text: #1E3A8A;
    --phase-bg: #F8FAFC;
    --phase-surface: #FFFFFF;
    --phase-neutral-border: #E2E8F0;
    --phase-muted: #64748B;
    --phase-text-main: #0F172A;
    max-width: 1680px;
    margin: 0 auto;
    padding: 18px;
    border: 1px solid var(--phase-neutral-border);
    border-radius: 8px;
    background: var(--phase-bg);
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.10);
    color: var(--phase-text-main);
  }

  .phase-dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--phase-neutral-border);
  }

  .phase-dashboard-title h2 {
    margin: 0;
    color: var(--phase-text);
    font-size: 1.55rem;
    font-weight: 750;
  }

  .phase-dashboard-stats,
  .phase-app-tabs,
  .phase-action-row,
  .phase-action-stack,
  .phase-unit-meta,
  .phase-unit-statuses,
  .phase-step-list,
  .phase-slot-summary,
  .phase-summary-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .phase-action-stack {
    align-items: stretch;
  }

  .phase-dashboard-stats {
    margin-top: 10px;
  }

  .phase-stat {
    border: 1px solid var(--phase-border);
    border-radius: 8px;
    background: var(--phase-surface);
    padding: 7px 10px;
    min-width: 116px;
  }

  .phase-stat-value {
    display: block;
    color: var(--phase-text);
    font-size: 1.05rem;
    font-weight: 750;
    line-height: 1.1;
  }

  .phase-stat-label {
    display: block;
    color: var(--phase-muted);
    font-size: 0.78rem;
  }

  .phase-app-tabs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    border: 1px solid var(--phase-border);
    border-radius: 8px;
    background: var(--phase-soft);
    padding: 10px;
    margin-bottom: 16px;
  }

  .phase-app-tab {
    display: grid;
    gap: 3px;
    min-height: 86px;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--phase-text-main);
    background: rgba(255, 255, 255, 0.65);
    padding: 10px 12px;
    text-decoration: none;
  }

  .phase-app-tab:hover {
    background: #fff;
    border-color: var(--phase-border);
    text-decoration: none;
  }

  .phase-app-tab.is-active {
    background: #fff;
    border-color: var(--phase-base);
    box-shadow: inset 0 3px 0 var(--phase-base), 0 1px 2px rgba(15, 23, 42, 0.08);
  }

  .phase-app-tab-add {
    border-style: dashed;
    justify-content: center;
    color: var(--phase-text);
  }

  .phase-app-tab-add-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: var(--phase-base);
    color: #fff;
    font-weight: 750;
  }

  .phase-app-tab-kicker,
  .phase-app-tab-detail {
    color: var(--phase-muted);
    font-size: 0.78rem;
  }

  .phase-app-tab-title {
    font-weight: 750;
  }

  .phase-dashboard-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(340px, 440px);
    gap: 16px;
    align-items: start;
  }

  .phase-dashboard-sidebar,
  .phase-flow-stack {
    display: grid;
    gap: 14px;
  }

  .phase-dashboard-sidebar {
    position: sticky;
    top: 16px;
    max-height: calc(100vh - 32px);
    overflow: auto;
    padding-right: 2px;
  }

  .phase-panel,
  .phase-node,
  .phase-unit-row,
  .phase-empty,
  .phase-tree-panel {
    border: 1px solid var(--phase-neutral-border);
    border-radius: 8px;
    background: var(--phase-surface);
  }

  .phase-panel {
    padding: 14px;
  }

  .phase-action-panel {
    border-color: var(--phase-border);
    background: var(--phase-soft);
  }

  .phase-danger-panel {
    border-color: #FECACA;
    background: #FEF2F2;
  }

  .phase-panel h5 {
    font-size: 0.96rem;
    margin-bottom: 10px;
  }

  .phase-panel.is-muted {
    background: #F8FAFC;
  }

  .phase-panel-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .phase-panel-title h5 {
    margin: 0;
    color: var(--phase-text);
    font-weight: 750;
  }

  .phase-panel-note,
  .phase-step-detail {
    color: var(--phase-muted);
    font-size: 0.82rem;
  }

  .phase-selected-summary {
    display: grid;
    gap: 6px;
  }

  .phase-selected-title {
    color: var(--phase-text);
    font-size: 1.08rem;
    font-weight: 750;
  }

  .phase-workflow-list {
    display: grid;
    gap: 8px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .phase-workflow-list li {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr);
    gap: 8px;
    align-items: start;
  }

  .phase-workflow-index {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: var(--phase-soft);
    color: var(--phase-text);
    font-size: 0.78rem;
    font-weight: 750;
  }

  .phase-flow-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .phase-flow-head h4 {
    margin: 0;
    color: var(--phase-text);
    font-size: 1.2rem;
    font-weight: 750;
  }

  .phase-tree-panel {
    padding: 14px;
  }

  .phase-tree-base,
  .phase-tree-node {
    display: grid;
    gap: 4px;
    border: 1px solid var(--phase-neutral-border);
    border-radius: 8px;
    background: #fff;
    color: var(--phase-text-main);
    padding: 10px 12px;
    text-decoration: none;
  }

  .phase-tree-base:hover,
  .phase-tree-node:hover {
    border-color: var(--phase-border);
    background: var(--phase-soft);
    text-decoration: none;
  }

  .phase-tree-base.is-selected,
  .phase-tree-node.is-selected {
    border-color: var(--phase-base);
    box-shadow: inset 3px 0 0 var(--phase-base);
  }

  .phase-tree-base-title,
  .phase-tree-node-title {
    color: var(--phase-text);
    font-weight: 750;
  }

  .phase-tree-base-meta,
  .phase-tree-node-meta {
    color: var(--phase-muted);
    font-size: 0.8rem;
  }

  .phase-tree-list,
  .phase-tree-children {
    display: grid;
    gap: 10px;
    margin: 10px 0 0;
    padding: 0;
    list-style: none;
  }

  .phase-tree-children {
    position: relative;
    margin-left: 22px;
    padding-left: 18px;
  }

  .phase-tree-children::before {
    content: "";
    position: absolute;
    left: 0;
    top: -10px;
    bottom: 14px;
    border-left: 2px solid var(--phase-border);
  }

  .phase-tree-li {
    position: relative;
  }

  .phase-tree-children > .phase-tree-li::before {
    content: "";
    position: absolute;
    left: -18px;
    top: 22px;
    width: 18px;
    border-top: 2px solid var(--phase-border);
  }

  .phase-tree-node {
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
  }

  .phase-tree-node-main {
    display: grid;
    gap: 2px;
  }

  .phase-tree-node-badges {
    display: flex;
    justify-content: flex-end;
  }

  .phase-detail-panel {
    display: grid;
    gap: 12px;
  }

  .phase-node {
    overflow: hidden;
  }

  .phase-node.is-base {
    border-color: var(--phase-border);
  }

  .phase-node-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-start;
    padding: 12px 14px;
    background: var(--phase-soft);
    border-bottom: 1px solid var(--phase-border);
  }

  .phase-node-header.is-base {
    background: var(--phase-soft);
  }

  .phase-parent-hint {
    margin-top: 6px;
    color: var(--phase-muted);
    font-size: 0.8rem;
  }

  .phase-node-title {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .phase-node-title strong {
    color: var(--phase-text);
    font-size: 1rem;
  }

  .phase-node-body {
    padding: 12px 14px 14px;
  }

  .phase-setup-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .phase-step-card {
    border: 1px solid var(--phase-neutral-border);
    border-radius: 8px;
    background: #fff;
    padding: 8px;
  }

  .phase-step-card.is-done {
    border-color: #BBF7D0;
    background: #F0FDF4;
  }

  .phase-step-card.is-partial {
    border-color: #FDE68A;
    background: #FFFBEB;
  }

  .phase-step-card.is-todo {
    background: #F8FAFC;
  }

  .phase-step-label {
    font-size: 0.82rem;
    font-weight: 750;
  }

  .phase-node-controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .phase-unit-list,
  .phase-partition-list {
    display: grid;
    gap: 8px;
  }

  .phase-unit-row,
  .phase-partition-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
  }

  .phase-unit-name {
    font-weight: 750;
  }

  .phase-slot-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .phase-slot-chip {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 2px 8px;
    border: 1px solid var(--phase-neutral-border);
    border-radius: 999px;
    background: #F8FAFC;
    color: #475569;
    font-size: 0.8rem;
  }

  .phase-slot-chip.is-filled {
    background: #ECFDF3;
    border-color: #BBF7D0;
    color: #166534;
  }

  .phase-slot-chip.is-empty {
    background: #F8FAFC;
    color: var(--phase-muted);
  }

  .phase-slot-summary {
    margin-top: 8px;
  }

  .phase-empty {
    padding: 16px;
    background: #F8FAFC;
    color: var(--phase-muted);
  }

  @media (max-width: 1100px) {
    .phase-dashboard-grid {
      grid-template-columns: 1fr;
    }

    .phase-dashboard-sidebar {
      position: static;
      max-height: none;
    }
  }

  @media (max-width: 768px) {
    .phase-tree-node,
    .phase-unit-row,
    .phase-partition-item {
      grid-template-columns: 1fr;
    }

    .phase-setup-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
