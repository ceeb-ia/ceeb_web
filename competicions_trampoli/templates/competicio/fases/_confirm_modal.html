<div class="phase-confirm-backdrop" id="phase-confirm-backdrop" hidden></div>
<section
  class="phase-confirm-modal"
  id="phase-confirm-modal"
  role="dialog"
  aria-modal="true"
  aria-hidden="true"
  aria-labelledby="phase-confirm-title"
  hidden>
  <div class="phase-confirm-head">
    <div>
      <p class="phase-confirm-kicker">Confirmacio</p>
      <h5 id="phase-confirm-title">Confirmar accio</h5>
    </div>
    <button class="btn btn-sm btn-outline-secondary" type="button" data-phase-confirm-cancel>Tancar</button>
  </div>
  <div class="phase-confirm-body">
    <p id="phase-confirm-message">Vols continuar?</p>
  </div>
  <div class="phase-confirm-foot">
    <button class="btn btn-sm btn-outline-secondary" type="button" data-phase-confirm-cancel>Cancel·lar</button>
    <button class="btn btn-sm btn-primary" type="button" id="phase-confirm-accept">Continuar</button>
  </div>
</section>
