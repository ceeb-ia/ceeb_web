{% extends "base.html" %}

{% block title %}Recuperar contrasenya{% endblock %}

{% block content %}
<style>
  .auth-shell .auth-card {
    width: 100%;
    max-width: none;
  }
</style>
<section class="container auth-shell py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card auth-card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Recuperar contrasenya</h1>
          <p class="text-muted mb-4">Introdueix el teu correu i t'enviarem un enllac per definir una contrasenya nova.</p>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Enviar enllaç</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
